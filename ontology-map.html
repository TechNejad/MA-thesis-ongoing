<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Ontology of Normative Role Design — Knowledge Graph</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #110e1f; color: #c9d1d9; overflow: hidden;
  -webkit-user-select: none; user-select: none;
}
canvas#graph { width: 100vw; height: 100vh; display: block; }

/* Header ribbon */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  pointer-events: none;
  padding: 14px 20px 12px;
  background: linear-gradient(180deg, #110e1fee 0%, #110e1fcc 60%, transparent 100%);
}
#header h1 { font-size: 20px; font-weight: 700; color: #f0f6fc; line-height: 1.2; }
#header p { font-size: 12px; color: #8b949e; margin-top: 3px; }

/* Tooltip */
#tooltip {
  position: fixed; pointer-events: none; opacity: 0;
  background: #1a1529; border: 1px solid #2d2640; border-radius: 10px;
  padding: 14px 18px; max-width: 360px; font-size: 13px; line-height: 1.5;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5); z-index: 200;
  transition: opacity 0.12s ease;
}
#tooltip.visible { opacity: 1; }
.tt-title { font-weight: 700; font-size: 14px; margin-bottom: 2px; color: #f0f6fc; }
.tt-class { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; opacity: 0.5; }
.tt-def { font-size: 12px; color: #c9d1d9; line-height: 1.5; }
.tt-papers { font-size: 11px; color: #8b949e; margin-top: 6px; }

/* Desktop toggle tabs */
.panel-tab {
  position: fixed; z-index: 101; cursor: pointer;
  background: #1a1529ee; border: 1px solid #2d2640;
  color: #8b949e; font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  transition: all 0.3s ease;
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px;
}
.panel-tab:hover { background: #231e35; color: #c9d1d9; }
.panel-tab svg { transition: transform 0.3s ease; }

#tab-controls {
  top: 16px; right: 16px; border-radius: 8px;
}
#tab-controls.hidden { right: 16px; }

#tab-legend {
  bottom: 16px; left: 16px; border-radius: 8px;
}
#tab-legend.hidden { left: 16px; }

/* Controls panel */
#controls {
  position: fixed; top: 16px; right: 16px;
  background: #1a1529ee; border: 1px solid #2d2640; border-radius: 12px;
  padding: 16px; z-index: 100; width: 260px;
  max-height: calc(100vh - 32px); overflow-y: auto;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  transition: transform 0.3s ease, opacity 0.3s ease;
}
#controls.hidden {
  transform: translateX(calc(100% + 32px));
  opacity: 0; pointer-events: none;
}
#controls h3 {
  font-size: 12px; font-weight: 600; color: #7b8fff;
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px;
}
.filter-section { margin-bottom: 14px; }
.filter-section-title {
  font-size: 10px; font-weight: 600; color: #8b949e;
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px;
}
.filter-pills { display: flex; flex-wrap: wrap; gap: 4px; }
.filter-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 14px;
  background: #231e35; border: 1px solid #2d2640;
  color: #8b949e; cursor: pointer; font-size: 11px;
  transition: all 0.15s ease; white-space: nowrap;
}
.filter-pill:hover { background: #2d2640; color: #c9d1d9; }
.filter-pill.active { color: #f0f6fc; border-color: currentColor; }
.filter-pill .dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.filter-pill .count { font-size: 9px; opacity: 0.6; }
.controls-divider { height: 1px; background: #231e35; margin: 12px 0; }
.filter-actions { display: flex; gap: 6px; margin-top: 10px; }
.action-btn {
  padding: 4px 10px; border-radius: 6px; border: 1px solid #2d2640;
  background: #231e35; color: #8b949e; cursor: pointer; font-size: 11px;
  transition: all 0.15s;
}
.action-btn:hover { background: #2d2640; color: #f0f6fc; }

/* Legend */
#legend {
  position: fixed; bottom: 16px; left: 16px;
  background: #1a1529ee; border: 1px solid #2d2640; border-radius: 12px;
  padding: 14px 18px; z-index: 100;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  max-width: 240px;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
#legend.hidden {
  transform: translateX(calc(-100% - 32px));
  opacity: 0; pointer-events: none;
}
#legend h3 {
  font-size: 12px; font-weight: 600; color: #7b8fff;
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
  cursor: default;
}
#legend-toggle {
  display: none; /* only shown on mobile */
  cursor: pointer; font-size: 14px; color: #8b949e;
  margin-left: auto; transition: transform 0.2s;
}
#legend-toggle.collapsed { transform: rotate(180deg); }
#legend-body { max-height: 400px; transition: max-height 0.3s ease, opacity 0.2s ease; overflow: hidden; }
#legend-body.collapsed { max-height: 0; opacity: 0; margin-top: 0; }
.legend-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 5px;
  font-size: 11px; color: #c9d1d9;
}
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-count { margin-left: auto; color: #8b949e; font-size: 10px; }
.legend-note { font-size: 10px; color: #8b949e; margin-top: 10px; line-height: 1.5; }
.legend-divider { height: 1px; background: #231e35; margin: 8px 0; }

/* Info panel (click detail) */
#info-panel {
  position: fixed; right: 16px; bottom: 16px;
  background: #1a1529; border: 1px solid #2d2640; border-radius: 12px;
  padding: 18px; z-index: 100; width: 340px; max-height: 50vh;
  overflow-y: auto; display: none;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}
#info-panel.visible { display: block; }
#close-panel {
  position: absolute; top: 10px; right: 14px; cursor: pointer;
  color: #8b949e; font-size: 18px; line-height: 1;
}
#close-panel:hover { color: #f0f6fc; }
#panel-title { font-size: 15px; font-weight: 700; color: #f0f6fc; margin-bottom: 4px; padding-right: 24px; }
#panel-class { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #8b949e; margin-bottom: 8px; }
#panel-def { font-size: 12px; color: #c9d1d9; line-height: 1.5; margin-bottom: 10px; }
.rel-section-title { font-size: 10px; font-weight: 600; color: #7b8fff; text-transform: uppercase; letter-spacing: 0.5px; margin: 8px 0 4px; }
.rel-item {
  display: flex; gap: 6px; padding: 3px 0; font-size: 11px;
  border-bottom: 1px solid #231e35;
}
.rel-label { color: #7b8fff; font-weight: 600; min-width: 90px; flex-shrink: 0; }
.rel-target { color: #c9d1d9; }

/* Mobile hamburger */
#mobile-toggle {
  display: none; position: fixed; top: 10px; right: 12px; z-index: 200;
  width: 36px; height: 36px; border-radius: 8px;
  background: #1a1529cc; border: 1px solid #2d2640;
  cursor: pointer; align-items: center; justify-content: center;
}
#mobile-toggle svg { fill: #c9d1d9; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2d2640; border-radius: 2px; }

/* Mobile */
@media (max-width: 768px) {
  #header { padding: 10px 16px 10px; }
  #header h1 { font-size: 15px; max-width: calc(100vw - 70px); }
  #header p { font-size: 10px; }
  #controls {
    position: fixed; top: 0; right: -280px; width: 270px; height: 100vh;
    border-radius: 0; padding: 60px 16px 16px;
    transition: right 0.3s ease; overflow-y: auto;
  }
  #controls.open { right: 0; }
  #mobile-toggle { display: flex; }
  .panel-tab { display: none; }
  #legend {
    max-width: 180px; padding: 10px 14px; bottom: 10px; left: 10px;
  }
  #legend h3 {
    font-size: 10px; margin-bottom: 0;
    display: flex; align-items: center;
  }
  #legend-toggle { display: inline-block; }
  /* collapsed state handled by .collapsed class, not media query */
  .legend-row { font-size: 10px; margin-bottom: 3px; }
  .legend-dot { width: 8px; height: 8px; }
  .legend-note { font-size: 9px; }
  #info-panel {
    width: calc(100vw - 32px); left: 16px; right: 16px;
    max-height: 40vh; bottom: 10px;
  }
  #tooltip { display: none !important; }
}
</style>
</head>

ticipants", "papers": 1}, {"name": "simulation_outcome_authority_bias", "cls": "C3.Simulation_Outcome", "definition": "Agents give preferentially favorable treatment based on perceived status or authority of other participants", "papers": 1}, {"name": "domain_competitive_market", "cls": "B1.Domain", "definition": "Competitive market simulation where firms set prices to maximize profit under conditions of mutual interdependence, such as Bertrand competition or oligopoly pricing", "papers": 1}, {"name": "role_type_norm_entrepreneur", "cls": "A1.Role_Type", "definition": "Agent designed to actively create, promote, and propagate social norms through communication and conflict detection; carries pre-loaded normative preferences and proactively engages when norm violations are observed", "papers": 1}, {"name": "behavior_norm_propagation", "cls": "C1.Agent_Behavior", "definition": "Agent proactively spreads normative standards to others through initiating conversations, educational outreach, and social influence; distinct from norm_enforcement (reactive) in being proactively initiated", "papers": 1}, {"name": "simulation_outcome_norm_emergence", "cls": "C3.Simulation_Outcome", "definition": "Social norms emerge through agent interaction and achieve widespread acceptance and behavioral compliance across the population, reducing social conflicts", "papers": 2}, {"name": "role_type_deceptive", "cls": "A1.Role_Type", "definition": "Agent designed to fabricate emotional states or social signals to manipulate other agents' behavior for strategic advantage", "papers": 1}, {"name": "simulation_outcome_opinion_fragmentation", "cls": "C3.Simulation_Outcome", "definition": "Population-level opinion diversity increases or is maintained, with agents retaining scattered positions rather than converging toward consensus.", "papers": 1}, {"name": "failure_mode_demographic_bias", "cls": "D1.Failure_Mode", "definition": "Agent trust or behavior exhibits systematic differential treatment based on counterpart demographic attributes (gender, race) not specified in the role design, arising from the interaction of persona-based roles with training data biases.", "papers": 1}, {"name": "domain_strategic_diplomacy", "cls": "B1.Domain", "definition": "Strategic board game simulating geopolitical competition requiring simultaneous negotiation, alliance formation, military planning, and deception among multiple nation-state agents.", "papers": 1}, {"name": "capability_self_play_evolution", "cls": "B3.Agentic_Capability", "definition": "Agent improves its strategies by playing games against copies of itself and incorporating accumulated experience into memory, enabling behavioral evolution without human training data.", "papers": 1}, {"name": "capability_dynamic_self_model", "cls": "B3.Agentic_Capability", "definition": "Agent maintains and updates a structured representation of its own psychological attributes (personality, emotions, goals) based on experienced events, enabling behavioral evolution through explicit self-model modification rather than through memory retrieval or reflective insight generation alone", "papers": 1}, {"name": "role_type_cooperative_executor", "cls": "A1.Role_Type", "definition": "Agent assigned to execute instructions from a director agent, producing specific solutions within a structured response format; role-locked to prevent assuming directive authority", "papers": 1}, {"name": "role_type_cooperative_director", "cls": "A1.Role_Type", "definition": "Agent assigned to decompose tasks into sequential instructions and direct an executor agent; controls conversation flow and task termination", "papers": 1}, {"name": "method_structured_protocol", "cls": "A2.Prompting_Method", "definition": "Role operationalized through explicit communication protocol constraints: mandated response formats, role-locking rules, termination tokens, and interaction sequence requirements", "papers": 1}, {"name": "domain_cooperative_task_solving", "cls": "B1.Domain", "definition": "General-purpose cooperative task completion where agents with complementary roles collaborate through structured multi-turn conversation to solve diverse tasks", "papers": 1}, {"name": "capability_instruction_following", "cls": "B3.Agentic_Capability", "definition": "Ability to receive structured instructions and produce specific, formatted solutions that address the instruction requirements", "papers": 1}, {"name": "capability_task_decomposition", "cls": "B3.Agentic_Capability", "definition": "Ability to break complex tasks into ordered, manageable instruction-input pairs for sequential execution by another agent", "papers": 1}, {"name": "behavior_instruction_compliance", "cls": "C1.Agent_Behavior", "definition": "Agent consistently follows structured instructions from a director agent, producing formatted solutions and maintaining its executor role", "papers": 1}, {"name": "behavior_task_decomposition", "cls": "C1.Agent_Behavior", "definition": "Agent decomposes complex goals into sequential instruction-input pairs, directing another agent through step-by-step task completion", "papers": 1}, {"name": "simulation_outcome_improved_task_quality", "cls": "C3.Simulation_Outcome", "definition": "Multi-agent cooperative solutions consistently outperform single-agent solutions in quality, detail, and implementability", "papers": 1}, {"name": "failure_mode_role_reversal", "cls": "D1.Failure_Mode", "definition": "Agent abandons its assigned role and assumes the behavioral pattern of the complementary role (e.g., executor starts directing, director starts executing), breaking the designed interaction protocol", "papers": 1}, {"name": "failure_mode_conversation_loop", "cls": "D1.Failure_Mode", "definition": "Agents enter infinite cycles of non-productive exchanges (thank-you loops, goodbye loops) from which they cannot recover, even when self-aware of the loop", "papers": 1}];
const rawTriples = [{"id": "T000", "subject": "role_type_baseline", "relation": "induces_behavior", "object": "behavior_greedy", "description": "The baseline role, which receives simulation rules with no substantive normative design, defaults to inducing individually greedy behavior among agents."}, {"id": "T001", "subject": "behavior_greedy", "relation": "drives_outcome", "object": "simulation_outcome_collective_failure", "description": "Unconstrained greedy behavior by all agents depletes the shared resource pool, driving the simulation outcome of collective failure."}, {"id": "T002", "subject": "role_type_selfish", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The selfish role is operationalized via persona framing by casting the agent as a profit-motivated outsider who is unfamiliar with local traditions."}, {"id": "T003", "subject": "role_type_selfish", "relation": "grounded_in", "object": "norm_frame_ethical_consequentialist", "description": "The selfish role is grounded in an ethical consequentialist framework where the agent prioritizes individual gain over collective welfare."}, {"id": "T004", "subject": "role_type_selfish", "relation": "induces_behavior", "object": "behavior_greedy", "description": "The selfish role induces the same greedy over-extraction behavior as the unprimed baseline."}, {"id": "T005", "subject": "capability_collective_awareness", "relation": "enables", "object": "behavior_sustainable", "description": "Agents' ability to reason about group-level consequences enables sustainable resource behavior \u2014 but only when paired with normative framing that activates it. In P1, all RCs have this capability, yet RC1 (baseline) and RC2 (selfish) agents default to greedy behavior regardless. The capability is necessary but not sufficient: it provides a channel for cooperation that normative design must switch on."}, {"id": "T006", "subject": "role_type_selfish", "relation": "elicits_response", "object": "behavior_norm_enforcement", "description": "Introducing a selfish agent into a cooperative community elicits a norm enforcement counter-response through dialogue and social pressure from the communal agents, driven by their community-oriented persona rather than explicit enforcement instructions."}, {"id": "T007", "subject": "role_type_universalized", "relation": "role_used_in", "object": "domain_tragedy_of_commons", "description": "The universalized role is deployed in the tragedy of the commons domain to test collective action dynamics around depletable shared resources."}, {"id": "T008", "subject": "role_type_universalized", "relation": "produces_failure", "object": "failure_mode_model_capacity_gap", "description": "The universalized role can result in a model capacity gap failure mode where weaker models fail to enact the designed universalization reasoning despite explicit prompting."}, {"id": "T009", "subject": "role_type_universalized", "relation": "grounded_in", "object": "norm_frame_ethical_deontological", "description": "The universalized role is grounded in ethical deontological reasoning \u2014 the agent is prompted to ask \"what if everyone did what I am about to do?\" before each action, forcing Kantian-style universalizability testing."}, {"id": "T010", "subject": "role_type_universalized", "relation": "has_prompting_method", "object": "method_principle_statement", "description": "The universalized role is operationalized via a principle statement prompt that is appended to each agent's memory every round."}, {"id": "T011", "subject": "method_principle_statement", "relation": "grounded_in", "object": "norm_frame_ethical_deontological", "description": "The principle statement prompting method is grounded in an ethical deontological framework, asking agents to reason about the consequences of universalizing their actions."}, {"id": "T012", "subject": "role_type_universalized", "relation": "induces_behavior", "object": "behavior_sustainable", "description": "The universalized role induces sustainable behavior by shifting agent resource extraction toward sustainable harvest rates."}, {"id": "T013", "subject": "behavior_sustainable", "relation": "drives_outcome", "object": "simulation_outcome_cooperation", "description": "Sustainable individual behavior by each agent aggregates to drive the collective simulation outcome of cooperation."}, {"id": "T014", "subject": "capability_resource_evaluation", "relation": "enables", "object": "behavior_greedy", "description": "The ability to evaluate extraction trade-offs enables greedy resource behavior. Baseline and selfish agents use resource evaluation to maximize individual extraction, depleting the commons. The capability is role-neutral \u2014 it enables whatever behavior the normative framing directs."}, {"id": "T015", "subject": "capability_communication", "relation": "enables", "object": "behavior_negotiation", "description": "The communication capability enables negotiation behavior by allowing open-ended, round-by-round norm coordination between agents."}, {"id": "T016", "subject": "behavior_negotiation", "relation": "drives_outcome", "object": "simulation_outcome_cooperation", "description": "Negotiation behavior acts as the proximate mechanism driving the simulation outcome of collective cooperation."}, {"id": "T017", "subject": "role_type_compromising", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The compromising role is operationalized via persona framing by positioning agents as balanced, empathetic negotiators."}, {"id": "T018", "subject": "role_type_communal_local", "relation": "role_used_in", "object": "domain_tragedy_of_commons", "description": "The communal local role is deployed in a tragedy-of-the-commons fishery simulation, where the agent's community-rooted identity shapes how it reasons about shared resource extraction."}, {"id": "T019", "subject": "role_type_communal_local", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The communal local role is operationalized via persona framing by casting the agent as a community-rooted local with familial ties to the shared resource."}, {"id": "T020", "subject": "role_type_communal_local", "relation": "grounded_in", "object": "norm_frame_ethical_virtue", "description": "The communal local role is grounded in an ethical virtue framework where care for the community functions as a character disposition rather than an explicit rule or incentive."}, {"id": "T021", "subject": "role_type_communal_local", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "The communal local role induces cooperative extraction behavior that aligns with previously established community norms."}, {"id": "T022", "subject": "role_type_communal_local", "relation": "induces_behavior", "object": "behavior_norm_enforcement", "description": "The communal local role induces norm enforcement behavior, with agents applying social pressure on defectors through communication. While not explicitly instructed to enforce norms, the persona's emphasis on community ties and care provides an implicit foundation for this behavior."}, {"id": "T023", "subject": "role_type_compromising", "relation": "has_prompting_method", "object": "method_incentive_structure", "description": "The compromising role is operationalized via the incentive structure prompting method by embedding specific win-win outcome targets."}, {"id": "T024", "subject": "role_type_compromising", "relation": "grounded_in", "object": "norm_frame_ethical_virtue", "description": "The compromising role is grounded in an ethical virtue framework where fairness and empathy function as inherent agent dispositions."}, {"id": "T025", "subject": "role_type_compromising", "relation": "grounded_in", "object": "norm_frame_ethical_consequentialist", "description": "The compromising role is also grounded in an ethical consequentialist framework, utilizing collective gain as the primary criterion for action."}, {"id": "T026", "subject": "role_type_compromising", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "The dual normative framing of the compromising role induces cooperative bargaining behavior across agent interactions."}, {"id": "T027", "subject": "capability_theory_of_mind", "relation": "enables", "object": "behavior_greedy", "description": "Theory of mind enables greedy negotiation by allowing agents to infer other parties' hidden preferences, not for mutual gain, but for self-serving deal selection. The same capability that supports cooperation under a compromising norm frame serves exploitation under a greedy one."}, {"id": "T028", "subject": "behavior_cooperation", "relation": "drives_outcome", "object": "simulation_outcome_cooperation", "description": "Cooperative behavior between agents drives the simulation outcome of mutually beneficial negotiation and cooperation."}, {"id": "T029", "subject": "role_type_greedy", "relation": "has_prompting_method", "object": "method_incentive_structure", "description": "The greedy role is operationalized via the incentive structure prompting method by explicitly targeting maximum individual score."}, {"id": "T030", "subject": "role_type_greedy", "relation": "grounded_in", "object": "norm_frame_ethical_consequentialist", "description": "The greedy role is grounded in an ethical consequentialist framework where the agent's own score serves as the sole evaluative criterion."}, {"id": "T031", "subject": "role_type_greedy", "relation": "induces_behavior", "object": "behavior_greedy", "description": "The greedy role's incentive structure induces self-maximizing, greedy behavior across all negotiation turns."}, {"id": "T032", "subject": "behavior_greedy", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Greedy, self-maximizing behavior reduces collective negotiation success rates, driving the simulation outcome of reduced success."}, {"id": "T033", "subject": "role_type_adversarial", "relation": "has_prompting_method", "object": "method_incentive_structure", "description": "The adversarial role is operationalized through an incentive structure that inverts standard scoring or assigns game-rule objectives favoring competitive advantage over cooperation."}, {"id": "T034", "subject": "role_type_adversarial", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The adversarial role is also operationalized via persona framing by instructing agents to carefully observe and exploit the target party."}, {"id": "T035", "subject": "role_type_adversarial", "relation": "grounded_in", "object": "norm_frame_ethical_consequentialist", "description": "The adversarial role is grounded in an ethical consequentialist framework where sabotaging the target serves as the defining outcome criterion."}, {"id": "T036", "subject": "role_type_adversarial", "relation": "induces_behavior", "object": "behavior_adversarial", "description": "The adversarial role's incentive structure induces active adversarial and sabotage behavior directed at a target negotiation party."}, {"id": "T037", "subject": "role_type_adversarial", "relation": "produces_failure", "object": "failure_mode_model_capacity_gap", "description": "GPT-3.5 fails to maintain adversarial behavior in the same way it fails the compromising role: drifts due to arithmetic errors and inability to track multi-party scoring."}, {"id": "T038", "subject": "role_type_compromising", "relation": "induces_behavior", "object": "behavior_misaligned", "description": "The compromising role induces misaligned behavior when capable models co-opt their exploration capabilities to exploit multi-deal generation for self-maximization rather than collective benefit."}, {"id": "T039", "subject": "capability_theory_of_mind", "relation": "enables", "object": "behavior_adversarial", "description": "Theory of mind enables adversarial behavior by allowing the agent to model what deals other parties would accept and strategically block or undermine them. The adversarial role uses preference inference as a weapon rather than a coordination tool."}, {"id": "T040", "subject": "behavior_adversarial", "relation": "drives_outcome", "object": "simulation_outcome_adversarial_coalition", "description": "Adversarial behavior by multiple agents produces coordinated pressure on the target party, driving the simulation outcome of an adversarial coalition."}, {"id": "T041", "subject": "role_type_compromising", "relation": "role_used_in", "object": "domain_negotiation", "description": "The compromising role is typically deployed in a non-zero-sum, multi-party negotiation domain."}, {"id": "T042", "subject": "role_type_greedy", "relation": "role_used_in", "object": "domain_negotiation", "description": "The greedy role is typically deployed in the negotiation domain, using self-maximizing incentives instead of cooperative ones."}, {"id": "T043", "subject": "role_type_adversarial", "relation": "role_used_in", "object": "domain_negotiation", "description": "The adversarial role is typically deployed in the negotiation domain using an inverted incentive structure designed to target a specific party."}, {"id": "T044", "subject": "capability_exploration_step", "relation": "intended_to_support", "object": "role_type_compromising", "description": "The exploration step capability is designed to support the compromising role by helping agents surface mutually beneficial deal options."}, {"id": "T045", "subject": "capability_exploration_step", "relation": "undermines", "object": "role_type_compromising", "description": "The exploration step capability can undermine the compromising role when capable models co-opt multi-deal generation for self-maximization instead of collective benefit."}, {"id": "T046", "subject": "capability_exploration_step", "relation": "produces_failure", "object": "failure_mode_model_capacity_gap", "description": "The exploration step capability can result in a capability exploitation failure mode when adversarial agents exploit it in ways not anticipated by the original role design."}, {"id": "T047", "subject": "role_type_compromising", "relation": "produces_failure", "object": "failure_mode_model_capacity_gap", "description": "The compromising role can result in a failure mode where weaker models abandon their assigned cooperative persona mid-negotiation."}, {"id": "T048", "subject": "failure_mode_model_capacity_gap", "relation": "leads_to", "object": "simulation_outcome_reduced_success", "description": "The failure mode based on model_capacity_gap leads to suboptimal or failed deals, driving the simulation outcome of reduced success."}, {"id": "T049", "subject": "failure_mode_capability_exploitation", "relation": "leads_to", "object": "simulation_outcome_reduced_success", "description": "The capability exploitation failure mode leads to degraded negotiation outcomes, driving the simulation outcome of reduced success."}, {"id": "T050", "subject": "role_type_situated_persona", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The situated persona role is operationalized via persona framing by assigning agents detailed narrative profiles that may include demographics, personality traits, social networks, ideological backstories, or professional characteristics."}, {"id": "T051", "subject": "role_type_situated_persona", "relation": "grounded_in", "object": "norm_frame_institutional_rules", "description": "The situated persona role is grounded in institutional rules - agents follow evacuation stage protocols, respond to crowd behavior, and select the most realistic option within structured emergency scenarios."}, {"id": "T052", "subject": "role_type_situated_persona", "relation": "role_used_in", "object": "domain_disaster_evacuation", "description": "The situated persona role is deployed in the disaster evacuation domain to simulate realistic, large-scale emergency responses."}, {"id": "T053", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_adaptive_evacuation", "description": "The situated persona role induces adaptive evacuation behavior by enabling agents to dynamically revise their routes to avoid congestion."}, {"id": "T054", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_information_sharing", "description": "The situated persona role induces information sharing behavior where agents share relevant situational knowledge, enabled by their communication capabilities and situational awareness."}, {"id": "T055", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_prosocial_assistance", "description": "The situated persona role induces prosocial assistance behavior, enabling agents to help vulnerable individuals during crises. While not explicitly instructed to assist, the persona's social ties and community embedding provide an implicit basis for this behavior."}, {"id": "T056", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_crowd_following", "description": "The situated persona role induces crowd-following behavior, particularly when agents experience high emotional states and decided to move with the majority without a clear plan."}, {"id": "T057", "subject": "capability_communication", "relation": "enables", "object": "behavior_information_sharing", "description": "The communication capability enables information sharing by providing channels through which agents can exchange situational knowledge, observations, and social signals."}, {"id": "T058", "subject": "capability_memory", "relation": "intended_to_support", "object": "role_type_situated_persona", "description": "The memory capability is designed to support the situated persona role by preserving behavioral continuity through concise summaries of past decisions."}, {"id": "T059", "subject": "capability_environmental_perception", "relation": "intended_to_support", "object": "role_type_situated_persona", "description": "The environmental perception capability is designed to support the situated persona role by providing dynamic, context-aware data on hazards and crowd conditions."}, {"id": "T060", "subject": "capability_emotional_reasoning", "relation": "intended_to_support", "object": "role_type_situated_persona", "description": "The emotional reasoning capability is designed to support the situated persona role by enabling self-assessments of panic that influence decision-making timing and urgency."}, {"id": "T061", "subject": "behavior_information_sharing", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "Emergent information sharing behavior among agents contributes to realistic evacuation timing patterns, driving the simulation outcome of validated realism."}, {"id": "T062", "subject": "behavior_adaptive_evacuation", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "Adaptive evacuation behavior, such as dynamic route revision, produces realistic road usage distributions that drive the simulation outcome of validated realism."}, {"id": "T063", "subject": "behavior_prosocial_assistance", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "Spontaneous prosocial assistance behavior contributes to group evacuation patterns that match empirical post-disaster observations, driving the simulation outcome of validated realism."}, {"id": "T064", "subject": "role_type_situated_persona", "relation": "role_used_in", "object": "domain_urban_mobility", "description": "The situated persona role is also typically deployed in the urban mobility domain or disaster relief and evacuation for multi-day simulations of movement and travel behavior across transportation networks."}, {"id": "T065", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_peak_spreading", "description": "The situated persona role induces peak spreading behavior as agents progressively adjust their departure times across multiple days to avoid congestion."}, {"id": "T066", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_route_learning", "description": "The situated persona role induces route learning behavior by allowing agents to reflect on past travel experiences to develop refined route preferences."}, {"id": "T067", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_social_coordination", "description": "The situated persona role induces social coordination behavior by prompting agents to negotiate shared resources and joint activities before finalizing daily plans."}, {"id": "T068", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_incident_adaptation", "description": "The situated persona role induces incident adaptation behavior as agents react to network disruptions by rerouting and adjusting departure times in subsequent days."}, {"id": "T069", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_over_reactive_avoidance", "description": "The situated persona role induces over-reactive avoidance behavior where agents persistently avoid previously disrupted routes even after they are restored."}, {"id": "T070", "subject": "capability_memory", "relation": "enables", "object": "behavior_route_learning", "description": "The memory capability enables route learning behavior by allowing agents to accumulate travel experiences and form generalized preferences over time."}, {"id": "T071", "subject": "capability_reflection", "relation": "enables", "object": "behavior_route_learning", "description": "The reflection capability enables route learning behavior by transforming specific travel experiences into generalized concepts for progressive behavioral adaptation."}, {"id": "T072", "subject": "capability_communication", "relation": "enables", "object": "behavior_social_coordination", "description": "The communication capability enables social coordination behavior by allowing inter-agent chat for resolving household constraints and joint activity planning."}, {"id": "T073", "subject": "capability_environmental_perception", "relation": "enables", "object": "behavior_incident_adaptation", "description": "The environmental perception capability enables incident adaptation behavior by allowing agents to detect real-time traffic disruptions and adapt their routes accordingly."}, {"id": "T074", "subject": "behavior_peak_spreading", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "The simulation successfully mimics the real world because the agents naturally learn to spread out their travel times to avoid rush hour traffic."}, {"id": "T075", "subject": "behavior_route_learning", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "Over several days, agents learn which routes work best, creating realistic traffic patterns that validate the simulation's accuracy."}, {"id": "T076", "subject": "behavior_incident_adaptation", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "The way agents adjust their travel plans in response to unexpected disruptions matches real-world data, validating the accuracy of the simulation."}, {"id": "T077", "subject": "role_type_situated_persona", "relation": "produces_failure", "object": "failure_mode_cooperative_bias", "description": "The situated persona role can result in a cooperative bias failure mode because the underlying LLM's helpfulness training overrides the attempt to simulate realistic, self-interested individual behavior."}, {"id": "T078", "subject": "capability_reflection", "relation": "intended_to_support", "object": "role_type_situated_persona", "description": "The reflection capability is designed to support the situated persona role by enabling day-to-day learning and the transformation of specific experiences into generalized behavioral evolution."}, {"id": "T079", "subject": "capability_planning", "relation": "intended_to_support", "object": "role_type_situated_persona", "description": "The planning capability is designed to support the situated persona role by generating realistic daily schedules that integrate personal constraints, social obligations, and travel conditions."}, {"id": "T080", "subject": "role_type_narrative_cooperative", "relation": "grounded_in", "object": "norm_frame_social_convention", "description": "The narrative cooperative role is grounded in social convention: the agent is primed with a folktale (e.g., \"The Flood\") that transmits cooperation norms through cultural storytelling rather than explicit ethical principles."}, {"id": "T081", "subject": "role_type_narrative_cooperative", "relation": "role_used_in", "object": "domain_public_goods_game", "description": "The narrative cooperative role is deployed in a repeated public goods game where agents decide contribution levels over multiple rounds with feedback between rounds."}, {"id": "T082", "subject": "role_type_narrative_heterogeneous", "relation": "has_prompting_method", "object": "method_narrative_priming", "description": "The narrative heterogeneous condition uses narrative priming \u2014 each agent in the same group receives a different narrative prime (cooperative, nonsensical, or none), creating within-group normative diversity."}, {"id": "T083", "subject": "role_type_narrative_heterogeneous", "relation": "grounded_in", "object": "norm_frame_social_convention", "description": "The heterogeneous condition is grounded in social convention \u2014 the cooperative narratives carry culturally transmitted behavioral expectations \u2014 though the mix of narratives means not all agents receive the same normative content."}, {"id": "T084", "subject": "role_type_narrative_heterogeneous", "relation": "role_used_in", "object": "domain_public_goods_game", "description": "The narrative heterogeneous condition is deployed in a repeated public goods game, where within-group normative diversity produced by mixed narratives leads to cooperation breakdown."}, {"id": "T085", "subject": "role_type_narrative_nonsensical", "relation": "has_prompting_method", "object": "method_narrative_priming", "description": "The nonsensical narrative condition uses narrative priming \u2014 but the appended story lacks cooperation-relevant moral content, serving as a control for whether narrative structure alone (without normative content) affects behavior."}, {"id": "T086", "subject": "role_type_narrative_nonsensical", "relation": "grounded_in", "object": "norm_frame_none_evident", "description": "The nonsensical narrative role has no identifiable normative framework \u2014 the narrative prime contains no cooperation-relevant moral or social content, which is the point: it tests whether narrative form alone matters."}, {"id": "T087", "subject": "role_type_narrative_nonsensical", "relation": "role_used_in", "object": "domain_public_goods_game", "description": "The nonsensical narrative condition is deployed in a repeated public goods game, serving as control against the cooperative narrative condition."}, {"id": "T088", "subject": "role_type_baseline", "relation": "induces_behavior", "object": "behavior_moderate_contribution", "description": "In a public goods game with no normative priming, the baseline role induces moderate contribution behavior - agents contribute at intermediate levels rather than defaulting to pure free-riding or full cooperation."}, {"id": "T089", "subject": "behavior_moderate_contribution", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Moderate but suboptimal contributions from baseline agents drive reduced collective success - cooperation is partial rather than sustained or collapsed."}, {"id": "T090", "subject": "role_type_selfish", "relation": "induces_behavior", "object": "behavior_moderate_contribution", "description": "In a public goods game, the explicit self-interest instruction produces contribution levels comparable to the unprimed baseline, suggesting the directive doesn't dramatically shift behavior beyond LLM defaults."}, {"id": "T091", "subject": "method_incentive_structure", "relation": "shapes_behavior", "object": "behavior_moderate_contribution", "description": "The incentive structure method targeting self-maximization shapes moderate contribution behavior in a public goods game - the explicit instruction doesn't produce dramatically different behavior from baseline LLM defaults."}, {"id": "T092", "subject": "role_type_narrative_cooperative", "relation": "has_prompting_method", "object": "method_narrative_priming", "description": "The cooperative narrative role is operationalized through narrative priming - appending cooperation-themed folk tales to the system prompt without explicit behavioral instruction."}, {"id": "T093", "subject": "method_narrative_priming", "relation": "grounded_in", "object": "norm_frame_social_convention", "description": "Narrative priming is grounded in a social convention normative frame - cultural stories transmit behavioral expectations through implicit community values rather than explicit rules or incentives."}, {"id": "T094", "subject": "role_type_narrative_cooperative", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "Shared cooperation-themed narratives induce near-perfect cooperative behavior in homogeneous groups, with agents achieving collaboration scores significantly above baselines across group sizes and network structures."}, {"id": "T095", "subject": "norm_frame_social_convention", "relation": "conditions_behavior", "object": "behavior_cooperation", "description": "Social convention framing conditions cooperative behavior \u2014 but only when the transmitted cultural narrative carries cooperation-relevant moral content. The same framing mechanism with a nonsensical narrative (P5_RC4) fails to produce cooperation, showing the frame itself is necessary but not sufficient."}, {"id": "T096", "subject": "role_type_narrative_nonsensical", "relation": "induces_behavior", "object": "behavior_moderate_contribution", "description": "Nonsensical narrative priming (stories without cooperation themes) induces baseline-level moderate contributions, confirming that the priming effect depends on story content, not narrative presence alone."}, {"id": "T097", "subject": "role_type_narrative_heterogeneous", "relation": "induces_behavior", "object": "behavior_strategic_exploitation", "description": "Heterogeneous narrative priming (different stories per agent) induces strategic exploitation: self-interested agents exploit the predictable contributions of cooperation-primed agents."}, {"id": "T098", "subject": "behavior_strategic_exploitation", "relation": "drives_outcome", "object": "simulation_outcome_cooperation_breakdown", "description": "Strategic exploitation by self-interested agents in narrative-incoherent groups drives cooperation breakdown - cooperative agents earn lowest payoffs while self-interested agents earn highest."}, {"id": "T099", "subject": "role_type_narrative_heterogeneous", "relation": "produces_failure", "object": "failure_mode_narrative_incoherence", "description": "Heterogeneous narrative assignment produces narrative incoherence failure: cooperation prompts that work individually become exploitable liabilities when agents lack shared narrative context."}, {"id": "T100", "subject": "failure_mode_narrative_incoherence", "relation": "leads_to", "object": "simulation_outcome_cooperation_breakdown", "description": "Narrative incoherence failure leads to cooperation breakdown as mismatched normative contexts create exploitable asymmetries between cooperative and self-interested agents."}, {"id": "T101", "subject": "role_type_value_primed", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The value-primed role is operationalized via persona framing by assigning agents a Schwartz value identity (\"You are a person attributing extremely more importance to [value]\")."}, {"id": "T102", "subject": "role_type_value_primed", "relation": "grounded_in", "object": "norm_frame_value_orientation", "description": "The value-primed role is grounded in a value orientation normative frame where abstract motivational goals from Schwartz theory guide agent behavior across interaction situations."}, {"id": "T103", "subject": "role_type_value_primed", "relation": "role_used_in", "object": "domain_interpersonal_trust", "description": "The value-primed role is deployed in the interpersonal trust domain to test whether value similarity shapes mutual trust and closeness evaluations between dialoguing agents."}, {"id": "T104", "subject": "role_type_value_primed", "relation": "induces_behavior", "object": "behavior_value_expressive_dialogue", "description": "The value-primed role induces value-expressive dialogue behavior, with agents producing conversation content that reflects their assigned value orientation."}, {"id": "T105", "subject": "role_type_value_primed", "relation": "induces_behavior", "object": "behavior_similarity_based_evaluation", "description": "The value-primed role induces similarity-based evaluation, with agents rating partners who share similar values higher on trust and interpersonal closeness."}, {"id": "T106", "subject": "capability_communication", "relation": "enables", "object": "behavior_value_expressive_dialogue", "description": "The communication capability enables value-expressive dialogue by allowing multi-turn conversation where agents can express and explore their assigned values with a partner."}, {"id": "T107", "subject": "behavior_similarity_based_evaluation", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "Similarity-based evaluation behavior replicates the human value similarity principle in LLM agents, driving the simulation outcome of validated realism against established social psychology theory."}, {"id": "T108", "subject": "role_type_value_primed", "relation": "produces_failure", "object": "failure_mode_language_dependent_controllability", "description": "Giving an AI a personality works well in English, but breaks down in other languages. When researchers tried the exact same experiment in Japanese, the agents often broke character or simply refused to reply."}, {"id": "T109", "subject": "role_type_baseline", "relation": "induces_behavior", "object": "behavior_opinion_convergence", "description": "A functional baseline role with no normative priming induces opinion convergence behavior where agents systematically drift toward a dominant position through repeated debate interactions."}, {"id": "T110", "subject": "role_type_baseline", "relation": "induces_behavior", "object": "behavior_asymmetric_acceptance", "description": "A functional baseline role induces asymmetric acceptance behavior where agents preferentially adopt more agreeable opinions and reject less agreeable ones, creating directional bias in opinion updating."}, {"id": "T111", "subject": "role_type_baseline", "relation": "induces_behavior", "object": "behavior_fallacious_argumentation", "description": "A functional baseline role induces fallacious argumentation behavior where agents generate logical fallacies, not specifically prompted to do so, but likely reflecting patterns in training data rather than any role design feature."}, {"id": "T112", "subject": "behavior_opinion_convergence", "relation": "drives_outcome", "object": "simulation_outcome_consensus_drift", "description": "Opinion convergence behavior drives consensus drift, where the population clusters around a dominant opinion without explicit coordination mechanisms."}, {"id": "T113", "subject": "behavior_asymmetric_acceptance", "relation": "drives_outcome", "object": "simulation_outcome_consensus_drift", "description": "Asymmetric acceptance behavior drives the directional component of consensus drift toward agreement."}, {"id": "T114", "subject": "behavior_fallacious_argumentation", "relation": "drives_outcome", "object": "simulation_outcome_consensus_drift", "description": "Fallacious argumentation contributes to consensus drift by persuading agents through reasoning that bypasses sound logic."}, {"id": "T115", "subject": "capability_communication", "relation": "enables", "object": "behavior_fallacious_argumentation", "description": "The communication capability enables fallacious argumentation by allowing agents to generate and exchange natural language arguments containing logical fallacies."}, {"id": "T116", "subject": "role_type_baseline", "relation": "produces_failure", "object": "failure_mode_fallacy_susceptibility", "description": "A functional baseline role produces fallacy susceptibility where LLM agents both generate and are persuaded by logically flawed arguments at high rates."}, {"id": "T117", "subject": "role_type_baseline", "relation": "role_used_in", "object": "domain_opinion_dynamics", "description": "The baseline role is deployed in the opinion dynamics domain to test emergent collective behavior when agents debate with no normative role design."}, {"id": "T118", "subject": "role_type_cooperative", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The cooperative role is operationalized via persona framing through a minimal single-word personality label (\"You are cooperative\") injected into the game prompt."}, {"id": "T119", "subject": "role_type_cooperative", "relation": "grounded_in", "object": "norm_frame_ethical_virtue", "description": "The cooperative role is grounded in an ethical virtue frame where \"cooperative\" functions as a character disposition guiding behavior toward joint benefit."}, {"id": "T120", "subject": "role_type_cooperative", "relation": "role_used_in", "object": "domain_strategic_game_theory", "description": "The cooperative role is deployed in classical strategic game theory domains (Prisoner's Dilemma, Battle of the Sexes) to test how personality labels affect strategic decisions."}, {"id": "T121", "subject": "role_type_cooperative", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "The cooperative personality label induces cooperative behavior in compatible pairings (CC), particularly when game length is known and agents can plan reciprocal strategies."}, {"id": "T122", "subject": "role_type_cooperative", "relation": "produces_failure", "object": "failure_mode_training_data_contamination", "description": "The cooperative role is undermined by LLMs' pre-existing knowledge of game-theoretic scenarios, as agents recognize game structures and apply learned optimal strategies that may override the assigned personality."}, {"id": "T123", "subject": "role_type_cooperative", "relation": "produces_failure", "object": "failure_mode_language_dependent_controllability", "description": "The cooperative personality label produces inconsistent behavior across languages, with penalties varying significantly between English, French, Arabic, Chinese, and Vietnamese."}, {"id": "T124", "subject": "role_type_selfish", "relation": "role_used_in", "object": "domain_strategic_game_theory", "description": "The selfish role is deployed in classical strategic game theory domains to test how self-interested personality labels affect strategic decisions across repeated games."}, {"id": "T125", "subject": "role_type_selfish", "relation": "induces_behavior", "object": "behavior_strategic_exploitation", "description": "In mixed personality pairings (CS), the selfish role induces strategic exploitation of cooperative opponents, extracting higher payoffs at the cooperative agent's expense."}, {"id": "T126", "subject": "capability_feedback_adaptation", "relation": "enables", "object": "behavior_cooperation", "description": "Access to game history enables cooperative behavior by allowing agents to observe reciprocal patterns and develop tit-for-tat strategies over repeated rounds."}, {"id": "T127", "subject": "behavior_strategic_exploitation", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Strategic exploitation by selfish agents in mixed-personality pairings drives reduced collective success as cooperative agents incur higher penalties."}, {"id": "T128", "subject": "failure_mode_training_data_contamination", "relation": "leads_to", "object": "simulation_outcome_reduced_success", "description": "Training data contamination reduces the effectiveness of personality-based role design, as agents default to strategies learned from training data rather than following assigned roles."}, {"id": "T129", "subject": "role_type_selfish", "relation": "produces_failure", "object": "failure_mode_language_dependent_controllability", "description": "The selfish personality label produces inconsistent behavior across languages, with broader variability in non-English languages."}, {"id": "T130", "subject": "role_type_institutional_balancer", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The institutional balancer role is operationalized via persona framing by assigning the agent the identity of a high-ranking policymaker overseeing operational institutions."}, {"id": "T131", "subject": "role_type_institutional_balancer", "relation": "grounded_in", "object": "norm_frame_institutional_rules", "description": "The institutional balancer role is grounded in institutional rules where behavior is governed by hierarchical position, procedural requirements, and multi-stakeholder balancing mandates."}, {"id": "T132", "subject": "role_type_institutional_balancer", "relation": "role_used_in", "object": "domain_institutional_land_use_policy", "description": "The institutional balancer role is deployed in a polycentric land use governance simulation with competing environmental and agricultural policy priorities."}, {"id": "T133", "subject": "role_type_institutional_balancer", "relation": "induces_behavior", "object": "behavior_incremental_adjustment", "description": "The institutional balancer role induces incremental budget and policy adjustments, avoiding radical changes even when institutional needs diverge significantly."}, {"id": "T134", "subject": "role_type_institutional_balancer", "relation": "induces_behavior", "object": "behavior_path_dependent_decision", "description": "The institutional balancer role induces path-dependent decision-making where early incremental choices constrain the range of future policy options."}, {"id": "T135", "subject": "behavior_incremental_adjustment", "relation": "drives_outcome", "object": "simulation_outcome_incremental_policy_convergence", "description": "Incremental budget and policy adjustments drive gradual convergence toward policy targets over extended simulation periods."}, {"id": "T136", "subject": "behavior_incremental_adjustment", "relation": "drives_outcome", "object": "simulation_outcome_persistent_budget_imbalance", "description": "Incremental adjustment behavior drives persistent budget imbalance as the agent fails to make radical corrections needed to align funding with institutional needs."}, {"id": "T137", "subject": "capability_planning", "relation": "enables", "object": "behavior_incremental_adjustment", "description": "The planning capability (step-by-step rationale requirement) enables incremental adjustment by forcing the agent to explicitly reason through stakeholder trade-offs before each decision."}, {"id": "T138", "subject": "capability_communication", "relation": "enables", "object": "behavior_sector_advocacy", "description": "The communication capability enables sector advocacy by allowing agents to construct and exchange natural language arguments for their assigned policy priorities."}, {"id": "T139", "subject": "role_type_institutional_balancer", "relation": "produces_failure", "object": "failure_mode_incomplete_information_processing", "description": "The institutional balancer role produces incomplete information processing where the high-level institution selectively attends to some agent inputs while missing others across decision cycles."}, {"id": "T140", "subject": "role_type_sector_advocate", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The sector advocate role is operationalized via persona framing by assigning agents the identity of policy-makers specializing in specific sectors."}, {"id": "T141", "subject": "role_type_sector_advocate", "relation": "grounded_in", "object": "norm_frame_institutional_rules", "description": "The sector advocate role is grounded in institutional rules where behavior is governed by sector mandates and institutional responsibilities."}, {"id": "T142", "subject": "role_type_sector_advocate", "relation": "role_used_in", "object": "domain_institutional_land_use_policy", "description": "The sector advocate role is deployed in polycentric land use governance with agents representing environmental and agricultural policy sectors."}, {"id": "T143", "subject": "role_type_sector_advocate", "relation": "induces_behavior", "object": "behavior_sector_advocacy", "description": "The sector advocate role induces consistent advocacy for the assigned sector's interests across repeated interactions with the high-level institution."}, {"id": "T144", "subject": "capability_hybrid_architecture", "relation": "enables", "object": "behavior_sector_advocacy", "description": "The hybrid LLM/rule-based architecture enables sector advocacy by combining LLM-driven argumentation for non-routine policy proposals with programmatic rule-based adjustment for routine policy adaptation."}, {"id": "T145", "subject": "role_type_sector_advocate", "relation": "produces_failure", "object": "failure_mode_hallucination", "description": "The sector advocate role produces hallucination where the environmental institution uses mean values instead of current values to describe time series data, generating plausible but factually incorrect reports."}, {"id": "T146", "subject": "capability_tool_use", "relation": "enables", "object": "behavior_sector_advocacy", "description": "The tool use capability enables sector advocacy by allowing operational institutions to analyze CRAFTY simulation data and construct evidence-based policy arguments."}, {"id": "T147", "subject": "behavior_sector_advocacy", "relation": "drives_outcome", "object": "simulation_outcome_persistent_budget_imbalance", "description": "Sector advocacy by both operational institutions and lobbyists drives persistent budget imbalance as environmental urgency arguments systematically outweigh agricultural economic arguments in high-level institution decision-making."}, {"id": "T148", "subject": "role_type_lobbyist", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The lobbyist role is operationalized via persona framing by assigning agents the identity of interest group representatives."}, {"id": "T149", "subject": "role_type_lobbyist", "relation": "grounded_in", "object": "norm_frame_institutional_rules", "description": "The lobbyist role is grounded in institutional rules where advocacy behavior is expected because of organizational affiliation rather than personal ethics."}, {"id": "T150", "subject": "role_type_lobbyist", "relation": "role_used_in", "object": "domain_institutional_land_use_policy", "description": "The lobbyist role is deployed in polycentric land use governance where interest groups advocate for competing policy priorities to a high-level institution."}, {"id": "T151", "subject": "role_type_lobbyist", "relation": "induces_behavior", "object": "behavior_sector_advocacy", "description": "The lobbyist role induces sector advocacy through interest-group-aligned argumentation, with each lobbyist consistently promoting its constituency's priorities."}, {"id": "T152", "subject": "role_type_functional_advisor", "relation": "role_used_in", "object": "domain_institutional_land_use_policy", "description": "The functional advisor role is deployed in polycentric land use governance to provide data analysis and legal information to the high-level institution."}, {"id": "T153", "subject": "capability_rag", "relation": "enables", "object": "behavior_sector_advocacy", "description": "The law consultant agent uses retrieval-augmented generation to access regulatory documents, enabling evidence-based sector advocacy in institutional land-use policy deliberations. RAG grounds the agent's policy positions in specific legal texts rather than relying solely on parametric knowledge."}, {"id": "T154", "subject": "role_type_functional_advisor", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The functional advisor role is operationalized through persona framing: \"You are an AI assistant in policy-making that can write Python code.\" The agent receives a professional knowledge domain identity rather than normative guidance."}, {"id": "T155", "subject": "role_type_functional_advisor", "relation": "grounded_in", "object": "norm_frame_none_evident", "description": "The functional advisor role has no identifiable normative framework \u2014 it is a task-execution role receiving technical instructions without ethical, social, or strategic behavioral expectations. NI_Count=1 (FUNCTIONAL)."}, {"id": "T156", "subject": "role_type_functional_advisor", "relation": "induces_behavior", "object": "behavior_task_execution", "description": "The functional advisor role induces task execution behavior where agents complete assigned analytical and informational workflows without normative behavioral shaping."}, {"id": "T157", "subject": "domain_institutional_land_use_policy", "relation": "drives_outcome", "object": "simulation_outcome_system_robustness", "description": "The polycentric institutional network maintains overall behavioral believability despite individual agent errors, as an emergent property of the hierarchical multi-agent architecture rather than any single role design."}, {"id": "T158", "subject": "role_type_data_driven_persona", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The data-driven persona role is operationalized via persona framing where agent profiles are generated from real player data clustering and text synthesis, providing economic identity descriptions."}, {"id": "T159", "subject": "role_type_data_driven_persona", "relation": "grounded_in", "object": "norm_frame_none_evident", "description": "The data-driven persona role carries no ethical, institutional, or social normative framing; profiles describe economic preferences rather than prescribing normative behavior toward others."}, {"id": "T160", "subject": "role_type_data_driven_persona", "relation": "role_used_in", "object": "domain_mmo_game_economy", "description": "The data-driven persona role is deployed in an MMO virtual economy simulation encompassing production, consumption, auction, P2P trade, and resource management activities."}, {"id": "T161", "subject": "role_type_data_driven_persona", "relation": "induces_behavior", "object": "behavior_role_specialization", "description": "The data-driven persona role induces role specialization where agents with different economic profiles develop distinct activity patterns (e.g., trading-focused vs. recharging-focused) aligned with their assigned preferences."}, {"id": "T162", "subject": "role_type_data_driven_persona", "relation": "induces_behavior", "object": "behavior_contextual_adaptation", "description": "The data-driven persona role induces contextual adaptation where agents dynamically revise economic strategies through reflection cycles when environmental conditions change."}, {"id": "T163", "subject": "role_type_data_driven_persona", "relation": "induces_behavior", "object": "behavior_negotiation", "description": "The data-driven persona role induces negotiation behavior where agents engage in multi-turn P2P trading with natural language bargaining, price proposals, and counteroffers."}, {"id": "T164", "subject": "capability_reflection", "relation": "enables", "object": "behavior_contextual_adaptation", "description": "The reflection capability enables contextual adaptation by allowing agents to periodically evaluate past actions and environmental changes, then devise revised strategies."}, {"id": "T165", "subject": "capability_memory", "relation": "enables", "object": "behavior_contextual_adaptation", "description": "The memory capability enables contextual adaptation by providing agents with short-term trajectory data and long-term experience records that inform strategy revision during reflection."}, {"id": "T166", "subject": "behavior_role_specialization", "relation": "drives_outcome", "object": "simulation_outcome_emergent_specialization", "description": "Role specialization behavior at the individual level drives the system-level outcome of emergent division of labor, where agents self-sort into differentiated economic roles."}, {"id": "T167", "subject": "role_type_data_driven_persona", "relation": "produces_failure", "object": "failure_mode_conservative_bias", "description": "The data-driven persona role produces conservative bias failure when LLM agents default to safe task-grinding actions rather than expressing their profile-specified economic orientations, particularly affecting profiles designed for active trading or spending."}, {"id": "T168", "subject": "role_type_baseline", "relation": "role_used_in", "object": "domain_strategic_game_theory", "description": "The baseline role (no normative content, pure game rules) is deployed in a strategic game theory domain. (Akata) uses thin baseline prompts in classic 2-player games."}, {"id": "T169", "subject": "role_type_baseline", "relation": "induces_behavior", "object": "behavior_retaliatory_defection", "description": "The baseline role induces retaliatory defection in repeated Prisoner's Dilemma games, where agents cooperate initially but permanently shift to defection after experiencing a single partner defection."}, {"id": "T170", "subject": "role_type_baseline", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "The baseline role induces cooperation when paired with consistently cooperative partners in repeated games, demonstrating that minimal role framing can still produce cooperative outcomes."}, {"id": "T171", "subject": "behavior_retaliatory_defection", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Retaliatory defection drives reduced joint success because the permanent shift to non-cooperation after a single defection prevents recovery of mutually beneficial coordination."}, {"id": "T172", "subject": "capability_feedback_adaptation", "relation": "enables", "object": "behavior_retaliatory_defection", "description": "Feedback adaptation (access to round history) enables retaliatory defection by providing the agent with information about past partner defections that triggers the permanent shift to non-cooperative play."}, {"id": "T173", "subject": "role_type_baseline", "relation": "produces_failure", "object": "failure_mode_coordination_rigidity", "description": "The baseline role produces coordination rigidity in Battle of the Sexes games, where agents persist with their preferred option despite recognizing opponent alternation patterns."}, {"id": "T174", "subject": "failure_mode_coordination_rigidity", "relation": "leads_to", "object": "simulation_outcome_reduced_success", "description": "Coordination rigidity leads to reduced joint success in coordination games because the agent's inability to alternate or adjust prevents achieving coordinated equilibria."}, {"id": "T175", "subject": "capability_theory_of_mind", "relation": "enables", "object": "behavior_cooperation", "description": "Theory of mind capability, engaged through Social Chain-of-Thought prompting that requires predicting the opponent's move before acting, enables cooperative coordination in games that require mutual adjustment."}, {"id": "T176", "subject": "capability_theory_of_mind", "relation": "enables", "object": "behavior_contextual_adaptation", "description": "Theory of mind capability engaged through SCoT enables contextual adaptation by allowing the agent to condition its action selection on predictions about opponent behavior, producing dynamic strategy revision across rounds."}, {"id": "T177", "subject": "role_type_baseline", "relation": "has_prompting_method", "object": "method_incentive_structure", "description": "The baseline role is operationalized through an incentive structure that presents explicit point payoffs for each action combination, framing the agent as a game player within a reward landscape without persona assignment or normative instruction."}, {"id": "T178", "subject": "role_type_professional_persona", "relation": "role_used_in", "object": "domain_team_assembly", "description": "The professional persona role is deployed in a team assembly domain where professionally profiled agents form teams through job fair interviews."}, {"id": "T179", "subject": "role_type_professional_persona", "relation": "induces_behavior", "object": "behavior_conversational_assessment", "description": "The professional persona with a team-building mandate induces conversational assessment: the recruiter evaluates candidates through multi-turn dialogue."}, {"id": "T180", "subject": "role_type_professional_persona", "relation": "induces_behavior", "object": "behavior_task_execution", "description": "The professional persona with a task mandate induces task execution where the recruiter proposes standard workflows with high accuracy in simple settings."}, {"id": "T181", "subject": "capability_memory", "relation": "enables", "object": "behavior_conversational_assessment", "description": "Memory enables conversational assessment by storing interview summaries and reflections that inform recruitment decisions."}, {"id": "T182", "subject": "capability_communication", "relation": "enables", "object": "behavior_conversational_assessment", "description": "Communication enables conversational assessment by providing the multi-turn dialogue channel for evaluating candidates."}, {"id": "T183", "subject": "role_type_professional_persona", "relation": "induces_behavior", "object": "behavior_capability_overstatement", "description": "The professional persona induces capability overstatement when job-seekers in competitive contexts fabricate skills beyond their biography."}, {"id": "T184", "subject": "capability_communication", "relation": "enables", "object": "behavior_capability_overstatement", "description": "Communication enables capability overstatement by providing the conversational channel through which agents can fabricate skills."}, {"id": "T185", "subject": "role_type_professional_persona", "relation": "produces_failure", "object": "failure_mode_persona_non_adherence", "description": "The professional persona produces persona non-adherence when persona-only design provides insufficient constraint to prevent agents from contradicting their biography."}, {"id": "T186", "subject": "behavior_conversational_assessment", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Conversational assessment drives reduced success because recruiters cannot verify candidate claims, leading to inclusion of unqualified agents as complexity increases."}, {"id": "T187", "subject": "behavior_capability_overstatement", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Capability overstatement drives reduced success by providing recruiters with false information that corrupts candidate identification."}, {"id": "T188", "subject": "failure_mode_persona_non_adherence", "relation": "leads_to", "object": "simulation_outcome_reduced_success", "description": "Persona non-adherence leads to reduced success because agents misrepresenting capabilities get recruited into roles they cannot fill."}, {"id": "T189", "subject": "behavior_misaligned", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Misaligned behavior by job-seekers - accepting mismatched offers, choosing wrong companies - drives reduced team assembly success."}, {"id": "T190", "subject": "role_type_professional_persona", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The professional persona role is operationalized through persona framing: agents receive a professional biography as initial identity (\"You are playing a role with the following biography\")."}, {"id": "T191", "subject": "role_type_professional_persona", "relation": "grounded_in", "object": "norm_frame_none_evident", "description": "The professional persona role has no detectable normative frame. Behavior is governed through task instructions and professional identity, not ethical principles, institutional rules, or social conventions."}, {"id": "T192", "subject": "role_type_professional_persona", "relation": "induces_behavior", "object": "behavior_information_sharing", "description": "The professional persona role induces information sharing: job-seeking agents share their professional background during interview conversations."}, {"id": "T193", "subject": "role_type_professional_persona", "relation": "induces_behavior", "object": "behavior_misaligned", "description": "The professional persona role induces misaligned behavior: job-seekers accept offers from companies that do not match their expertise and choose wrong companies to interview with."}, {"id": "T194", "subject": "role_type_prosocial_primed", "relation": "has_prompting_method", "object": "method_contextual_framing", "description": "The prosocial-primed role is operationalized via contextual framing: embedding a prosocial game label ('Teamwork Game') or short value-laden phrases ('we are family') in the agent's private biography."}, {"id": "T195", "subject": "role_type_prosocial_primed", "relation": "grounded_in", "object": "norm_frame_social_convention", "description": "The prosocial-primed role is grounded in social convention: shared cultural phrases ('we are family,' 'caring for each other') and cooperative game labels encode prosocial expectations through implicit community values."}, {"id": "T196", "subject": "role_type_prosocial_primed", "relation": "role_used_in", "object": "domain_public_goods_game", "description": "The prosocial-primed role is deployed in one-shot and multi-round public goods games to test whether prosocial framing increases contributions."}, {"id": "T197", "subject": "role_type_prosocial_primed", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "The prosocial-primed role induces cooperative behavior where agents contribute significantly above the neutral baseline, replicating the direction of human prosocial priming effects."}, {"id": "T198", "subject": "role_type_self_interest_primed", "relation": "has_prompting_method", "object": "method_contextual_framing", "description": "The self-interest-primed role is operationalized via contextual framing: a negative game label ('Taxation Game') or transactional phrases ('I want to profit,' 'making a deal') embedded in the agent's private biography."}, {"id": "T199", "subject": "role_type_self_interest_primed", "relation": "grounded_in", "object": "norm_frame_ethical_consequentialist", "description": "The self-interest-primed role is grounded in egoistic consequentialism: p
