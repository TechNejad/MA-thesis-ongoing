riming phrases frame interaction as transactional and self-serving ('how are you useful for me,' 'I want to profit')."}, {"id": "T200", "subject": "role_type_self_interest_primed", "relation": "role_used_in", "object": "domain_public_goods_game", "description": "The self-interest-primed role is deployed in one-shot and multi-round Public Goods Games to test whether negative priming reduces contributions."}, {"id": "T201", "subject": "role_type_self_interest_primed", "relation": "induces_behavior", "object": "behavior_moderate_contribution", "description": "The self-interest-primed role induces moderate contributions below the neutral baseline but not zero, replicating the direction of human negative priming effects."}, {"id": "T202", "subject": "role_type_situated_persona", "relation": "role_used_in", "object": "domain_social_simulation", "description": "The situated persona role is deployed in a classroom social simulation where personality-typed students navigate institutional rules (late policy) and personal perturbations (midterms)."}, {"id": "T203", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_norm_violation", "description": "The situated persona role (with personality traits and perturbation pressure) induces norm violation: students propose cheating when private communication channels exist and institutional penalties are harsh."}, {"id": "T204", "subject": "capability_communication", "relation": "enables", "object": "behavior_norm_violation", "description": "Private communication (Workroom location) enables norm violation by allowing students to coordinate cheating away from the professor. Without private rooms, cheating never occurs across any condition."}, {"id": "T205", "subject": "norm_frame_institutional_rules", "relation": "conditions_behavior", "object": "behavior_norm_violation", "description": "Institutional rules (late policy with penalties) condition norm violation: cheating occurs only under medium/harsh late policies, not lenient ones. Harsher rules create stronger incentives to circumvent them."}, {"id": "T206", "subject": "method_stake_prompting", "relation": "shapes_behavior", "object": "behavior_cooperation", "description": "Stake-prompting shapes cooperative behavior by reducing it: making personal costs salient ('five-month-old child,' 'parked across the parking lot') decreases prosocial cart return frequency, producing more realistic human-like behavior."}, {"id": "T207", "subject": "role_type_baseline", "relation": "produces_failure", "object": "failure_mode_cooperative_bias", "description": "The baseline role with no normative content produces cooperative bias failure where agents default to prosocial behavior regardless of personal costs, failing to replicate human behavioral variation."}, {"id": "T208", "subject": "behavior_cooperation", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "Cooperative behavior (PGG contributions, cart return) drives validated realism: the direction and pattern of prosocial behavior matches human experimental data across priming, transparency, and endowment conditions."}, {"id": "T209", "subject": "behavior_norm_violation", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "Norm violation behavior (emergent cheating in classroom) drives validated realism: the pattern of cheating emergence under institutional pressure matches expected human behavior in academic settings."}, {"id": "T210", "subject": "role_type_situated_persona", "relation": "role_used_in", "object": "domain_recommender_social_simulation", "description": "The situated persona role is deployed in a recommender + social network sandbox where agents browse, search, watch, chat, and broadcast based on their assigned user profiles."}, {"id": "T211", "subject": "role_type_situated_persona", "relation": "grounded_in", "object": "norm_frame_social_convention", "description": "The situated persona role is grounded in social conventions that define informal behavioral expectations for different user archetypes, shaping how agents interact based on their assigned social identity rather than explicit rules or institutional mandates."}, {"id": "T212", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_preference_expression", "description": "The situated persona role induces preference-consistent behavior: agents select movies, generate ratings, and produce feedback aligned with their assigned traits and interests, outperforming traditional simulators in adversarial evaluation."}, {"id": "T213", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_opinion_convergence", "description": "The situated persona role induces opinion convergence where multiple persona-bearing agents interacting through social channels progressively align their evaluations over repeated rounds."}, {"id": "T214", "subject": "capability_memory", "relation": "enables", "object": "behavior_preference_expression", "description": "Three-tier memory (sensory, short-term, long-term) enables preference expression by providing agents with accumulated viewing history and reflected insights that inform profile-consistent choices."}, {"id": "T215", "subject": "behavior_preference_expression", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "Profile-consistent preference expression drives validated realism as agents produce recommendation selections close to real human performance and outperform traditional simulators."}, {"id": "T216", "subject": "behavior_preference_expression", "relation": "drives_outcome", "object": "simulation_outcome_information_cocoon", "description": "Preference expression drives information cocoon formation as agents act on profile-consistent preferences and the recommender algorithm learns increasingly narrow patterns over time."}, {"id": "T217", "subject": "behavior_opinion_convergence", "relation": "drives_outcome", "object": "simulation_outcome_conformity_emergence", "description": "Opinion convergence drives conformity emergence: repeated social influence through chat and broadcasting causes agent ratings to concentrate, with agents having more friends showing higher score-changing probability."}, {"id": "T218", "subject": "behavior_information_sharing", "relation": "drives_outcome", "object": "simulation_outcome_conformity_emergence", "description": "Information sharing (chat and broadcasting) drives conformity emergence by propagating movie opinions through the social network, enabling the social influence that concentrates agent ratings over time."}, {"id": "T219", "subject": "role_type_situated_persona", "relation": "produces_failure", "object": "failure_mode_memory_saturation", "description": "The situated persona role produces memory saturation failure: after ~15 rounds, accumulated memory contents exceed effective processing capacity, causing believability to drop below 4/5 as agents fail to extract relevant information for persona-consistent behavior."}, {"id": "T220", "subject": "role_type_game_strategic", "relation": "role_used_in", "object": "domain_auction_game", "description": "The game-strategic role with a survival imperative and no persona is deployed in a resource allocation auction game under scarcity conditions."}, {"id": "T221", "subject": "role_type_game_strategic", "relation": "induces_behavior", "object": "behavior_contextual_adaptation", "description": "The game-strategic role with survival imperative produces adaptive bidding behavior - agents adjust bids each round based on current supply, health status, and resource balance."}, {"id": "T222", "subject": "behavior_contextual_adaptation", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Adaptive bidding in a scarce-resource auction produces partial survival - wealthier agents survive more consistently while resource-poor agents face elimination."}, {"id": "T223", "subject": "role_type_game_strategic", "relation": "grounded_in", "object": "norm_frame_strategic_instrumental", "description": "The game-strategic role derives behavioral norms from survival-driven strategic rationality, using pure game-theoretic incentive framing with no ethical or social dimension."}, {"id": "T224", "subject": "role_type_situated_persona", "relation": "role_used_in", "object": "domain_auction_game", "description": "Situated personas with detailed personality profiles (profession, personality, background) are deployed in a competitive auction game."}, {"id": "T225", "subject": "role_type_situated_persona", "relation": "grounded_in", "object": "norm_frame_strategic_instrumental", "description": "The situated persona role is grounded in a strategic-instrumental normative frame where behavioral expectations derive from game-winning logic rather than ethical or social principles, even when persona traits are layered on top."}, {"id": "T226", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_contextual_adaptation", "description": "In a competitive auction, situated personas produce the same adaptive bidding behavior as the baseline - persona traits do not differentiate strategic behavior."}, {"id": "T227", "subject": "role_type_situated_persona", "relation": "produces_failure", "object": "failure_mode_persona_non_adherence", "description": "Situated personas in competitive auction settings fail to produce personality-consistent strategic behavior. Human judges rate Identity Alignment as lowest dimension."}, {"id": "T228", "subject": "role_type_situated_persona", "relation": "role_used_in", "object": "domain_opinion_dynamics", "description": "Situated persona (partisan ideology in biographical narrative) deployed in political opinion dynamics where agents discuss polarizing topics over multiple rounds."}, {"id": "T229", "subject": "role_type_situated_persona", "relation": "has_prompting_method", "object": "method_cognitive_bias_instruction", "description": "Situated persona augmented with cognitive bias instruction telling agents to exhibit confirmation bias, reinforcing ideological commitment beyond narrative alone."}, {"id": "T230", "subject": "method_cognitive_bias_instruction", "relation": "shapes_behavior", "object": "behavior_position_maintenance", "description": "Cognitive bias instruction shapes position maintenance: agents told to accept ideology-consistent information and reject contradictory information maintain partisan stances more consistently."}, {"id": "T231", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_position_maintenance", "description": "With confirmation bias instruction, situated persona induces position maintenance: agents hold partisan stances in intra-party conversations with reduced drift cross-party."}, {"id": "T232", "subject": "behavior_position_maintenance", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "Position maintenance drives partial validated realism: intra-party stance stability matches human patterns, though cross-party dynamics still diverge from human polarization."}, {"id": "T233", "subject": "role_type_situated_persona", "relation": "produces_failure", "object": "failure_mode_ideological_alignment_bias", "description": "Situated persona (partisan ideology) produces ideological alignment bias: Republican agents drift toward model's intrinsic Democratic position despite explicit Republican narratives."}, {"id": "T234", "subject": "failure_mode_ideological_alignment_bias", "relation": "leads_to", "object": "simulation_outcome_consensus_drift", "description": "Ideological alignment bias leads to consensus drift: model's pre-training political lean causes Republican agents to converge toward Democrat positions."}, {"id": "T235", "subject": "capability_communication", "relation": "enables", "object": "behavior_opinion_convergence", "description": "Multi-round conversation enables opinion convergence: iterative exchange provides the mechanism through which model-intrinsic biases manifest as progressive attitude shifts."}, {"id": "T236", "subject": "role_type_situated_persona", "relation": "grounded_in", "object": "norm_frame_ideological", "description": "The situated persona role is grounded in an ideological normative frame where partisan worldview is prescribed via narrative backstory and explicit policy positions across 6 domains; the agent is told what it believes but must infer behavioral expectations from that identity."}, {"id": "T237", "subject": "role_type_selfish", "relation": "has_prompting_method", "object": "method_incentive_structure", "description": "The selfish (proself) role is reinforced through incentive structure prompting that injects self-interest traits and advantage-seeking trade approach into the decision profile each turn."}, {"id": "T238", "subject": "role_type_selfish", "relation": "role_used_in", "object": "domain_social_exchange", "description": "The proself role is deployed in a social exchange simulation where three agents trade resources across repeated rounds with negotiation and execution phases."}, {"id": "T239", "subject": "role_type_selfish", "relation": "induces_behavior", "object": "behavior_commitment_breach", "description": "The proself role induces commitment breach - agents deliberately withhold or under-deliver promised resources during the execution phase when it serves their self-interest."}, {"id": "T240", "subject": "role_type_selfish", "relation": "induces_behavior", "object": "behavior_negotiation", "description": "The proself role produces negotiation behavior as agents propose and evaluate resource exchanges during the negotiation phase."}, {"id": "T241", "subject": "behavior_commitment_breach", "relation": "drives_outcome", "object": "simulation_outcome_endgame_defection", "description": "Strategic commitment breaching intensifies in final rounds, producing endgame defection where agents prioritize immediate utility over relationship maintenance."}, {"id": "T242", "subject": "role_type_prosocial_primed", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The prosocial role is operationalized via the same persona framing as the proself role - a named trading agent with resource specialization."}, {"id": "T243", "subject": "role_type_prosocial_primed", "relation": "has_prompting_method", "object": "method_incentive_structure", "description": "The prosocial role is reinforced through incentive structure prompting that injects mutual-benefit traits and commitment-keeping trade approach into the decision profile."}, {"id": "T244", "subject": "role_type_prosocial_primed", "relation": "grounded_in", "object": "norm_frame_ethical_consequentialist", "description": "The prosocial role is grounded in collective consequentialism - agents oriented toward mutual benefit and reciprocal gains rather than individual maximization."}, {"id": "T245", "subject": "role_type_prosocial_primed", "relation": "role_used_in", "object": "domain_social_exchange", "description": "The prosocial role is deployed in the same social exchange simulation as the proself role."}, {"id": "T246", "subject": "role_type_prosocial_primed", "relation": "induces_behavior", "object": "behavior_commitment_honoring", "description": "The prosocial role induces commitment honoring - agents faithfully deliver promised resources, building trust and enabling sustained high-value exchanges."}, {"id": "T247", "subject": "behavior_cooperation", "relation": "drives_outcome", "object": "simulation_outcome_system_resilience", "description": "Cooperative patterns enable recovery from trust violations - interdependent resource needs drive agents to resume exchanges despite past breaches."}, {"id": "T248", "subject": "capability_bdi_reasoning", "relation": "enables", "object": "behavior_contextual_adaptation", "description": "BDI reasoning enables agents to adapt strategy across game phases - from cautious exploration to optimized cooperation to strategic endgame play."}, {"id": "T249", "subject": "capability_affinity_tracking", "relation": "enables", "object": "behavior_commitment_breach", "description": "Affinity tracking makes strategic breaching possible by providing agents with a model of relationship consequences - agents weigh reputation damage against immediate gain."}, {"id": "T250", "subject": "capability_affinity_tracking", "relation": "enables", "object": "behavior_commitment_honoring", "description": "Affinity tracking reinforces commitment honoring by making trust benefits visible - keeping promises raises affinity scores, enabling larger future exchanges."}, {"id": "T251", "subject": "role_type_prosocial_primed", "relation": "produces_failure", "object": "failure_mode_cooperative_bias", "description": "The prosocial role may amplify rather than create cooperation, since LLM training toward helpfulness makes it difficult to isolate the designed prosocial effect from baseline cooperative tendencies."}, {"id": "T252", "subject": "domain_social_exchange", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "The social exchange domain produces validated behavioral realism - LLM agent exchange patterns validate all six Homans' SET propositions and match human behavior in trust recovery experiments."}, {"id": "T253", "subject": "role_type_prosocial_primed", "relation": "grounded_in", "object": "norm_frame_ethical_deontological", "description": "The prosocial role carries a deontological dimension - \"Always keep commitment\" functions as a categorical directive with no outcome justification, structurally paralleling Kantian promise-keeping. Coded alongside consequentialist grounding as a hybrid frame."}, {"id": "T254", "subject": "role_type_strategic_communicator", "relation": "has_prompting_method", "object": "method_knowledge_injection", "description": "The strategic communicator role is enhanced through knowledge injection - Lakoff & Johnson conceptual metaphor theory (ontological, structural, spatial) is injected into reasoning and generation prompts to enable metaphorical communication."}, {"id": "T255", "subject": "role_type_strategic_communicator", "relation": "grounded_in", "object": "norm_frame_strategic_instrumental", "description": "The strategic communicator role derives behavioral norms from strategic-instrumental rationality."}, {"id": "T256", "subject": "role_type_strategic_communicator", "relation": "role_used_in", "object": "domain_social_deduction_game", "description": "The strategic communicator role is deployed in a social deduction game (Undercover) where players identify team memberships through descriptive clues and elimination voting."}, {"id": "T257", "subject": "role_type_strategic_communicator", "relation": "induces_behavior", "object": "behavior_covert_communication", "description": "The strategic communicator role induces covert communication - agents use metaphors to create information-asymmetric channels that include allies and exclude adversaries."}, {"id": "T258", "subject": "role_type_strategic_communicator", "relation": "induces_behavior", "object": "behavior_deception", "description": "The strategic communicator role induces deception when the agent identifies as undercover - agents describe the opposing word's features to blend with the majority team."}, {"id": "T259", "subject": "role_type_strategic_communicator", "relation": "induces_behavior", "object": "behavior_contextual_adaptation", "description": "The strategic communicator role induces contextual adaptation - agents shift strategies across rounds as their self-identified role crystallizes through the Self-Monitor module."}, {"id": "T260", "subject": "behavior_covert_communication", "relation": "drives_outcome", "object": "simulation_outcome_covert_coordination", "description": "Covert metaphorical communication produces successful coordination between allied agents while excluding adversaries from the information channel."}, {"id": "T261", "subject": "capability_metaphor_reasoning", "relation": "enables", "object": "behavior_covert_communication", "description": "Hypothesis-based metaphor reasoning (using conceptual metaphor theory) enables agents to generate and interpret metaphorical speech for covert communication."}, {"id": "T262", "subject": "capability_theory_of_mind", "relation": "enables", "object": "behavior_deception", "description": "Theory of Mind (Belief Mapper) enables deception by allowing agents to model other players' beliefs and craft misleading descriptions that exploit information asymmetry."}, {"id": "T263", "subject": "role_type_strategic_communicator", "relation": "produces_failure", "object": "failure_mode_cooperative_bias", "description": "The strategic communicator role produces cooperative bias where models default to identifying as part of the cooperative majority, making adversarial play significantly weaker."}, {"id": "T264", "subject": "role_type_adversarial", "relation": "has_prompting_method", "object": "method_knowledge_injection", "description": "The adversarial attacker role uses knowledge injection - metaphor theory is embedded in the guidance strategy to enable indirect covert guidance."}, {"id": "T265", "subject": "role_type_adversarial", "relation": "grounded_in", "object": "norm_frame_strategic_instrumental", "description": "The adversarial attacker role derives its behavioral norms from strategic-instrumental rationality: guiding the defender toward the target word while concealing intent."}, {"id": "T266", "subject": "role_type_adversarial", "relation": "role_used_in", "object": "domain_adversarial_language_game", "description": "The adversarial role is deployed in a competitive two-player language game (Adversarial Taboo) where the attacker guides the defender toward saying a secret word."}, {"id": "T267", "subject": "role_type_adversarial", "relation": "induces_behavior", "object": "behavior_covert_communication", "description": "The adversarial attacker role induces covert communication - attacker uses metaphorical guidance to steer conversation toward the target word without explicit mention."}, {"id": "T268", "subject": "role_type_adversarial", "relation": "induces_behavior", "object": "behavior_deception", "description": "The adversarial attacker role induces deception - attacker introduces interfering concepts that differ from the secret word to mislead the defender."}, {"id": "T269", "subject": "behavior_deception", "relation": "drives_outcome", "object": "simulation_outcome_covert_coordination", "description": "Deceptive metaphorical guidance by the attacker produces covert coordination outcomes - the attacker achieves its hidden goal through indirect communication."}, {"id": "T270", "subject": "role_type_strategic_communicator", "relation": "role_used_in", "object": "domain_adversarial_language_game", "description": "The strategic communicator role (defender) is deployed in Adversarial Taboo, using metaphor reasoning defensively to detect and counter attacker guidance."}, {"id": "T271", "subject": "role_type_strategic_interviewer", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The interviewer role uses persona framing: 'You are an interviewer. Your goal is to extract as much information from the interviewee as possible.' (App E.1)"}, {"id": "T272", "subject": "role_type_strategic_interviewer", "relation": "has_prompting_method", "object": "method_incentive_structure", "description": "The interviewer's reward is the number of unique information items extracted, creating an explicit incentive structure for strategic questioning."}, {"id": "T273", "subject": "role_type_strategic_interviewer", "relation": "grounded_in", "object": "norm_frame_strategic_instrumental", "description": "The interviewer role's norms derive from game logic: maximize information extraction over K turns, with reward = % of items disclosed."}, {"id": "T274", "subject": "role_type_strategic_interviewer", "relation": "role_used_in", "object": "domain_strategic_dialogue", "description": "The strategic interviewer role is deployed in a simulated journalistic interview game based on 40K+ NPR/CNN transcripts."}, {"id": "T275", "subject": "role_type_strategic_interviewer", "relation": "induces_behavior", "object": "behavior_contextual_adaptation", "description": "The interviewer role produces contextual adaptation: LLMs maintain context understanding but default to follow-up questions rather than strategic pivots."}, {"id": "T276", "subject": "role_type_strategic_interviewer", "relation": "produces_failure", "object": "failure_mode_grounding_deficit", "description": "The interviewer role produces grounding deficit where agents fail to generate acknowledgments and strategic topic transitions despite prompt instructions prescribing these behaviors."}, {"id": "T277", "subject": "failure_mode_grounding_deficit", "relation": "leads_to", "object": "simulation_outcome_reduced_success", "description": "Grounding deficit leads to reduced extraction success because without rapport-building and strategic pivoting, interviewers cannot persuade sources to disclose information."}, {"id": "T278", "subject": "role_type_communication_persona", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "Source role uses persona framing: 'You are a {persona} source' with 8 communication personas, each with distinct speech characteristics, persuasion triggers, and few-shot examples."}, {"id": "T279", "subject": "role_type_communication_persona", "relation": "grounded_in", "object": "norm_frame_social_convention", "description": "Source personas are grounded in social communication conventions: how anxious, adversarial, defensive, etc. people behave in interviews, drawn from journalism textbooks (Sedorkin 2015)."}, {"id": "T280", "subject": "role_type_communication_persona", "relation": "role_used_in", "object": "domain_strategic_dialogue", "description": "Source personas deployed in simulated journalistic interview where information disclosure depends on persona type and persuasion level."}, {"id": "T281", "subject": "role_type_communication_persona", "relation": "induces_behavior", "object": "behavior_information_gating", "description": "Persona assignment induces information gating: sources disclose items based on persuasion level (1-5 scale) via Beta distribution parameterized per persona. Straightforward yields highest extraction; adversarial lowest."}, {"id": "T282", "subject": "capability_feedback_adaptation", "relation": "enables", "object": "behavior_information_gating", "description": "Eedback adaptation (tracking persuasion history via previous_persona_scores) enables dynamic information gating: sources adjust disclosure based on cumulative conversation persuasion assessment."}, {"id": "T283", "subject": "behavior_information_gating", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "Persona-conditioned information gating produces validated realism as source persuasion self-assessments correlate with human journalist ratings."}, {"id": "T284", "subject": "role_type_reflective_reasoner", "relation": "role_used_in", "object": "domain_hybrid_table_reasoning", "description": "The reflective reasoner role is deployed in tasks that require answering questions by combining structured data from tables with unstructured text from surrounding documents."}, {"id": "T285", "subject": "capability_reflection", "relation": "undermines", "object": "role_type_reflective_reasoner", "description": "The reflection capability, designed to support iterative self-improvement, instead undermines the reflective reasoner role: extended reflection amplifies self-doubt and causes the agent to abandon correct answers, with performance degrading the more reflection iterations are added."}, {"id": "T286", "subject": "role_type_reflective_reasoner", "relation": "grounded_in", "object": "norm_frame_ethical_virtue", "description": "The reflective reasoner role is grounded in ethical virtue: the structured reasoning process prescribes intellectual virtues \u2014 careful task assessment, creative exploration, and self-critical refinement \u2014 as the path to good performance."}, {"id": "T287", "subject": "role_type_reflective_reasoner", "relation": "has_prompting_method", "object": "method_structured_reasoning_process", "description": "The reflective reasoner role is operationalized through a structured reasoning process with four explicit stages (Identify, Improvise, Introspect, Iterate), each with detailed meta-cognitive instructions."}, {"id": "T288", "subject": "method_structured_reasoning_process", "relation": "grounded_in", "object": "norm_frame_ethical_virtue", "description": "The structured reasoning process prescribes intellectual virtues (\"Be humble and honest,\" \"Do not critique for the sake of critique\") as behavioral expectations, grounding it in an ethical-virtue frame."}, {"id": "T289", "subject": "capability_reflection", "relation": "enables", "object": "behavior_iterative_refinement", "description": "The Introspect stage evaluates solution quality (Decision: Certain/Doubtful), enabling iterative refinement when solutions are judged doubtful."}, {"id": "T290", "subject": "role_type_reflective_reasoner", "relation": "induces_behavior", "object": "behavior_iterative_refinement", "description": "He reflective reasoner role produces iterative self-refinement through the four-stage Philosopher process. This is the intent designed behavior."}, {"id": "T291", "subject": "role_type_reflective_reasoner", "relation": "induces_behavior", "object": "behavior_overthinking", "description": "The reflective reasoner role produces emergent overthinking where agents revise correct responses, exhibit under-confidence, and shift to meta-commentary, degrading accuracy with each iteration."}, {"id": "T292", "subject": "behavior_overthinking", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Overthinking degrades performance across benchmarks as agents cross an \"overthinking threshold\" where additional reflection harms rather than helps."}, {"id": "T293", "subject": "role_type_reflective_reasoner", "relation": "produces_failure", "object": "failure_mode_overthinking", "description": "The iterative reflection process designed for quality improvement instead amplifies self-doubt. Agents exhibit Under-Confidence, Out-of-Focus, and Daydreaming behaviors."}, {"id": "T294", "subject": "role_type_reflective_reasoner", "relation": "induces_behavior", "object": "behavior_task_drift", "description": "The reflective reasoner role induces task drift: agents analyze peripheral or tangential information while neglecting core task requirements. This is a behavioral consequence of the structured reasoning process, where extended reflection leads agents to pursue increasingly marginal lines of analysis."}, {"id": "T295", "subject": "role_type_philosophical_persona", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "Each philosophical persona is operationalized through persona framing: 1-2 sentence identity prompts assigning philosophical reasoning styles."}, {"id": "T296", "subject": "role_type_philosophical_persona", "relation": "grounded_in", "object": "norm_frame_ethical_virtue", "description": "Philosophical personas are grounded in virtue-based epistemological traditions: Socratic inquiry, Platonic idealism, Aristotelian empiricism, Confucian harmony, Taoist naturalness."}, {"id": "T297", "subject": "role_type_philosophical_persona", "relation": "role_used_in", "object": "domain_hybrid_table_reasoning", "description": "Five philosophical personas deployed in Symposium framework across four hybrid table reasoning benchmarks."}, {"id": "T298", "subject": "capability_communication", "relation": "enables", "object": "behavior_dialectical_deliberation", "description": "Communication (Conference and Discussion phases) enables dialectical deliberation where philosophers present proposals and engage in dialectical exchange."}, {"id": "T299", "subject": "role_type_philosophical_persona", "relation": "induces_behavior", "object": "behavior_dialectical_deliberation", "description": "The philosophical persona role induces dialectical deliberation: agents engage in multi-perspective debate from distinct philosophical traditions."}, {"id": "T300", "subject": "role_type_philosophical_persona", "relation": "induces_behavior", "object": "behavior_opinion_convergence", "description": "Despite instruction to maintain independence, philosophical personas converge toward consensus (Echo Chamber) with phrases like \"I agree with my colleagues.\""}, {"id": "T301", "subject": "behavior_opinion_convergence", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Opinion convergence in multi-agent deliberation contributes to reduced performance as agents abandon correct positions to match group consensus."}, {"id": "T302", "subject": "role_type_philosophical_persona", "relation": "produces_failure", "object": "failure_mode_cooperative_bias", "description": "Philosophical personas exhibit cooperative bias: agents converge on consensus despite explicit instruction to maintain independent positions. Extends this failure mode from game-theoretic settings to cognitive deliberation."}, {"id": "T303", "subject": "role_type_situated_persona", "relation": "produces_failure", "object": "failure_mode_exposure", "description": "The situated persona role produces an exposure failure where agents inadvertently reveal concealed information through their utterances, lacking the common sense needed to anticipate what their responses disclose to adversaries."}, {"id": "T304", "subject": "capability_theory_of_mind", "relation": "enables", "object": "behavior_information_concealment", "description": "Theory of mind (modeling what the spy knows) is necessary for effective concealment - citizens must anticipate what their answers reveal to the spy. LLMs frequently fail at this."}, {"id": "T305", "subject": "failure_mode_exposure", "relation": "leads_to", "object": "simulation_outcome_reduced_success", "description": "Exposure (citizens revealing the location) directly causes citizen team failure. When citizens leak the location, the spy can win by guessing correctly based on the leaked information."}, {"id": "T306", "subject": "role_type_adversarial", "relation": "induces_behavior", "object": "behavior_subtext_inference", "description": "Spy role induces subtext inference: agents must infer the hidden location from indirect cues in citizen answers. Measured through ICR (exploiting explicit clues) and IDR (synthesizing implicit clues)."}, {"id": "T307", "subject": "role_type_adversarial", "relation": "induces_behavior", "object": "behavior_contextual_adaptation", "description": "Spy adjusts guessing certainty across turns based on accumulated evidence. The system uses a certainty threshold (9/10) to trigger location guessing."}, {"id": "T308", "subject": "capability_theory_of_mind", "relation": "enables", "object": "behavior_subtext_inference", "description": "Theory of mind enables the spy to interpret citizen answers as indirect clues about the hidden location, synthesizing scattered hints across multiple utterances."}, {"id": "T309", "subject": "behavior_subtext_inference", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Subtext inference quality varies widely across models, with stronger models achieving substantially higher implicit deduction rates. This variation drives different win rates and overall performance."}, {"id": "T310", "subject": "role_type_adversarial", "relation": "produces_failure", "object": "failure_mode_dissociation", "description": "The adversarial role produces a dissociation failure where agents treat their own prior utterances as evidence from other players, leading to incorrect reasoning chains."}, {"id": "T311", "subject": "role_type_adversarial", "relation": "produces_failure", "object": "failure_mode_memory_distortion", "description": "The adversarial role produces a memory distortion failure where agents use false or fabricated memories to make decisions, referencing conversations or events that never occurred."}, {"id": "T312", "subject": "role_type_adversarial", "relation": "produces_failure", "object": "failure_mode_character_ambiguity", "description": "The adversarial role produces a character ambiguity failure where agents confuse their assigned role identity, either believing they belong to the opposing team or adopting the opposing team's goals."}, {"id": "T313", "subject": "failure_mode_dissociation", "relation": "leads_to", "object": "simulation_outcome_reduced_success", "description": "Dissociation causes incorrect location deduction: when the spy attributes its own words to other players, it forms false evidence chains that lead to wrong guesses, lowering GSR and IDR."}, {"id": "T314", "subject": "failure_mode_character_ambiguity", "relation": "leads_to", "object": "simulation_outcome_reduced_success", "description": "Character ambiguity increases suspicion on the spy: when the spy confuses its role and acts like a citizen, it produces unusual utterances that draw votes, increasing Caught Rate and Vote Rate."}, {"id": "T315", "subject": "role_type_situated_persona", "relation": "has_prompting_method", "object": "method_incentive_structure", "description": "The citizen role is operationalized through dual methods: persona framing that assigns a virtual role identity, and an incentive structure that provides explicit goals, constraints, and win conditions as a strategic behavioral layer."}, {"id": "T316", "subject": "role_type_game_strategic", "relation": "has_prompting_method", "object": "method_cultural_transmission", "description": "The game-strategic role incorporates cultural transmission where later-generation agents receive surviving agents' strategies and must modify them to create their own."}, {"id": "T317", "subject": "method_cultural_transmission", "relation": "shapes_behavior", "object": "behavior_norm_evolution", "description": "Cultural transmission drives strategy evolution as agents inherit, modify, and complexify strategies across generations, with successful norms accumulating cooperative content over time."}, {"id": "T318", "subject": "role_type_game_strategic", "relation": "induces_behavior", "object": "behavior_norm_evolution", "description": "The game-strategic role with cultural transmission produces norm evolution across generations, with strategy complexity increasing over time, though the development of cooperative norms varies by model capability."}, {"id": "T319", "subject": "behavior_norm_evolution", "relation": "drives_outcome", "object": "simulation_outcome_cooperation", "description": "Norm evolution drives cooperation as strategies accumulate cooperative content across generations, including higher initial contributions, reciprocity-based adjustments, and free-rider punishment rules."}, {"id": "T320", "subject": "capability_feedback_adaptation", "relation": "enables", "object": "behavior_contextual_adaptation", "description": "The feedback adaptation capability enables contextual adaptation by giving agents access to recent interaction histories, allowing them to infer others' reputations and adjust their own behavior accordingly through indirect reciprocity."}, {"id": "T321", "subject": "norm_frame_strategic_instrumental", "relation": "conditions_behavior", "object": "behavior_norm_evolution", "description": "Strategic-instrumental framing (survival pressure, resource maximization) conditions norm evolution: agents develop increasingly sophisticated cooperative strategies across generations because the selection mechanism rewards strategic norm compliance, not because any ethical principle demands it."}, {"id": "T322", "subject": "role_type_game_strategic", "relation": "induces_behavior", "object": "behavior_norm_enforcement", "description": "The game-strategic role with costly punishment induces norm enforcement where agents develop strategies that target defectors, though the frequency and effectiveness of punishment varies by model."}, {"id": "T323", "subject": "role_type_game_strategic", "relation": "produces_failure", "object": "failure_mode_excessive_punishment", "description": "The game-strategic role with costly punishment can produce an excessive punishment failure where some models over-punish, destroying resources rather than supporting cooperation."}, {"id": "T324", "subject": "failure_mode_excessive_punishment", "relation": "leads_to", "object": "simulation_outcome_reduced_success", "description": "Excessive punishment leads to net resource destruction, with average final resources decreasing across generations in the punishment condition, performing worse than the no-punishment baseline."}, {"id": "T325", "subject": "role_type_game_strategic", "relation": "role_used_in", "object": "domain_strategic_game_theory", "description": "The game-strategic role with survival pressure and cultural evolution is deployed in the Donor Game, a strategic game theory domain with generational competition."}, {"id": "T326", "subject": "role_type_game_strategic", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "The game-strategic role induces cooperation through cultural evolution, where agents bootstrap cooperation across generations. Survival selection and cultural transmission create conditions for cooperative norms to emerge and spread."}, {"id": "T327", "subject": "role_type_game_strategic", "relation": "has_prompting_method", "object": "method_incentive_structure", "description": "The game-strategic role is operationalized through an incentive structure that sets explicit survival pressure and resource maximization goals."}, {"id": "T328", "subject": "role_type_game_strategic", "relation": "role_used_in", "object": "domain_social_deduction_game", "description": "The game-strategic crewmate role (no persona, pure objective-based) is deployed in Among Us, a social deduction game requiring cooperative communication to identify a hidden imposter. First use of game_strategic (rather than situated_persona) in this domain."}, {"id": "T329", "subject": "role_type_game_strategic", "relation": "induces_behavior", "object": "behavior_information_sharing", "description": "The game-strategic role induces information sharing where trained agents learn to share environment observations that help identify adversarial players."}, {"id": "T330", "subject": "role_type_game_strategic", "relation": "induces_behavior", "object": "behavior_deception", "description": "The game-strategic role induces strategic lying even within cooperative teams, where agents fabricate evidence to achieve team objectives."}, {"id": "T331", "subject": "role_type_adversarial", "relation": "role_used_in", "object": "domain_social_deduction_game", "description": "Adversarial imposter role deployed in Among Us. Must kill crewmates during gameplay and avoid detection during discussions. Trained via self-play with inverted speaking reward."}, {"id": "T332", "subject": "capability_communication", "relation": "enables", "object": "behavior_deception", "description": "Free-form NL discussion enables both cooperative deception (crewmates fabricating evidence) and adversarial deception (imposters counter-accusing and mimicking crewmates). Communication is the substrate for deception in social deduction."}, {"id": "T333", "subject": "role_type_game_strategic", "relation": "produces_failure", "object": "failure_mode_degenerate_convention", "description": "RL training can produce degenerate social conventions where agents develop high-win-rate strategies that violate communicative role expectations, such as coordinated silence or passive behavioral loops."}, {"id": "T334", "subject": "capability_feedback_adaptation", "relation": "enables", "object": "behavior_information_sharing", "description": "RL training with listening loss (imposter prediction) teaches crewmates to share useful observations. The dense reward signal from predicting the imposter identity drives agents to produce and interpret informative messages."}, {"id": "T335", "subject": "role_type_antagonistic", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The antagonistic role is operationalized via persona framing through a short prompt that designs interpersonal hostility rather than mere self-interest."}, {"id": "T336", "subject": "role_type_prosocial", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The prosocial role is operationalized via persona framing through short trait labels that assign a cooperative character disposition rather than behavioral rules or contextual cues."}, {"id": "T337", "subject": "role_type_prosocial", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "The prosocial character disposition induces cooperative behavior where agents use empathetic tones, accept deals earlier, and prioritize agreement over self-interest, producing profit margins below baseline."}, {"id": "T338", "subject": "role_type_greedy", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The greedy role is operationalized via minimal persona framing using a short trait label that relies on the model's pre-trained understanding of greediness rather than explicit strategic instructions."}, {"id": "T339", "subject": "role_type_baseline", "relation": "role_used_in", "object": "domain_negotiation", "description": "The baseline role with no persona conditioning is deployed in a buyer-seller negotiation game to establish reference performance metrics for comparison with persona-conditioned agents."}, {"id": "T340", "subject": "role_type_baseline", "relation": "induces_behavior", "object": "behavior_negotiation", "description": "The baseline role in a buyer-seller game induces standard negotiation behavior: moderate profit margins, average-length negotiations, no distinctive communication style. All deals succeed due to the positive cost-willingness gap."}, {"id": "T341", "subject": "role_type_antagonistic", "relation": "grounded_in", "object": "norm_frame_social_convention", "description": "The antagonistic persona is grounded in social convention: prompts like 'You don't like the other player. You insult them.' construct relational expectations about interpersonal conduct rather than outcome maximization or ethical principles."}, {"id": "T342", "subject": "role_type_antagonistic", "relation": "induces_behavior", "object": "behavior_greedy", "description": "The antagonistic persona induces greedy profit-maximizing behavior through aggressive offers and pressure tactics, producing significantly higher profit margins than the baseline."}, {"id": "T343", "subject": "role_type_antagonistic", "relation": "induces_behavior", "object": "behavior_strategic_exploitation", "description": "The antagonistic persona induces strategic exploitation through hostile communication, using insults and pressure tactics to intimidate the counterparty into unfavorable deals."}, {"id": "T344", "subject": "role_type_antagonistic", "relation": "role_used_in", "object": "domain_negotiation", "description": "The antagonistic (cunning) role is deployed in a buyer-seller negotiation game where the hostile persona produces aggressive communication, pressure tactics, and higher profit margins."}, {"id": "T345", "subject": "role_type_prosocial", "relation": "role_used_in", "object": "domain_negotiation", "description": "The prosocial role is deployed in a buyer-seller negotiation game where kind and generous personas produce cooperative outcomes with profit margins below baseline, demonstrating that prosocial trait labels orient agents toward agreement over self-interested bargaining."}, {"id": "T346", "subject": "role_type_prosocial", "relation": "grounded_in", "object": "norm_frame_social_convention", "description": "The prosocial role is grounded in social convention when the prompt references the other player, defining interpersonal conduct expectations rather than assigning a character trait in isolation."}, {"id": "T347", "subject": "role_type_prosocial", "relation": "grounded_in", "object": "norm_frame_ethical_virtue", "description": "The prosocial role is grounded in ethical virtue when the prompt is purely self-referential with no mention of others, so behavior flows from character identity rather than relational expectations."}, {"id": "T348", "subject": "role_type_greedy", "relation": "grounded_in", "object": "norm_frame_ethical_virtue", "description": "The greedy role is grounded in ethical virtue (vice) when the prompt is purely self-referential, with no mention of others. Behavior flows from character identity rather than outcome-maximization instructions or relational expectations."}, {"id": "T349", "subject": "role_type_statecraft_agent", "relation": "induces_behavior", "object": "behavior_escalation", "description": "The statecraft role with military-diplomatic authority produces systematic escalation across models, with agents choosing increasingly aggressive actions over time, developing arms races and territorial disputes."}, {"id": "T350", "subject": "role_type_statecraft_agent", "relation": "induces_behavior", "object": "behavior_negotiation", "description": "Nation agents extensively use messaging between nations, but diplomatic communication fails to prevent escalation spirals."}, {"id": "T351", "subject": "role_type_statecraft_agent", "relation": "induces_behavior", "object": "behavior_first_strike_reasoning", "description": "Agents generate private reasoning justifying preemptive nuclear strikes, even without direct provocation. Documented in qualitative analysis."}, {"id": "T352", "subject": "norm_frame_strategic_instrumental", "relation": "conditions_behavior", "object": "behavior_escalation", "description": "Strategic-instrumental framing (resource management, military competition, national objectives) without explicit de-escalation norms channels agent behavior toward escalation as the apparently rational strategic path."}, {"id": "T353", "subject": "behavior_escalation", "relation": "drives_outcome", "object": "simulation_outcome_escalation_spiral", "description": "Individual agent escalation aggregates into system-level spirals: arms races, territorial disputes, and in extreme cases, nuclear confrontation across all 5 models and 3 scenarios."}, {"id": "T354", "subject": "domain_wargame_simulation", "relation": "drives_outcome", "object": "simulation_outcome_escalation_spiral", "description": "The military-diplomatic domain structure (8 nations, 27-action menu including nuclear options, resource competition) reliably produces escalation spirals regardless of LLM used."}, {"id": "T355", "subject": "role_type_statecraft_agent", "relation": "produces_failure", "object": "failure_mode_escalation_tendency", "description": "The statecraft role enables dangerous escalation because the action menu includes aggressive options (nuclear strikes, invasions) without normative guardrails against using them. Prompt ablations (shutdown, simulation, freedom) do not reliably mitigate this."}, {"id": "T356", "subject": "role_type_game_strategic", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "In Avalon, all agents receive persona-based role identity (\"You are {name}, the {role}\") with faction-specific introductions, goals, and initial strategies. The persona framing defines both what the agent knows and how it should behave within the game."}, {"id": "T357", "subject": "role_type_game_strategic", "relation": "induces_behavior", "object": "behavior_information_concealment", "description": "Evil-side agents conceal their true faction identity during discussions, elaborating on their initial deception instructions by developing camouflage strategies such as fabricating alternative identities."}, {"id": "T358", "subject": "role_type_game_strategic", "relation": "produces_failure", "object": "failure_mode_exposure", "description": "Good-side agents excessively self-disclose identities. \"unreasonable behavior distribution, such as excessive self-disclosure actions.\" This undermines the strategic goal of keeping identities hidden from the evil side."}, {"id": "T359", "subject": "capability_memory", "relation": "undermines", "object": "role_type_game_strategic", "description": "Memory capabilities undermine the good-side game strategic role: agents accumulate too much conversational context and end up excessively self-disclosing their identity (70% of Loyal Servants), directly contradicting their strategic concealment objectives."}, {"id": "T360", "subject": "capability_feedback_adaptation", "relation": "enables", "object": "behavior_deception", "description": "Experience learning enables adversarial agents to refine deceptive strategies across games, reducing overt confrontation and increasing teamwork to make deception more effective."}, {"id": "T361", "subject": "behavior_deception", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "Evil agents' camouflage behavior, such as identity fabrication that elaborates on initial deception instructions, mirrors human strategies in social deduction games, contributing to validated realism."}, {"id": "T362", "subject": "role_type_personality_primed", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "Personality-primed role operationalized via persona framing: 15 shuffled Big Five adjectives with intensity modifiers injected into system prompt with \"Reflect your personality in the negotiation process.\""}, {"id": "T363", "subject": "role_type_personality_primed", "relation": "grounded_in", "object": "norm_frame_ethical_virtue", "description": "The personality-primed role is grounded in an ethical virtue frame where Big Five adjectives map onto virtue-vice polarities. Agents embody character traits rather than following rules or pursuing abstract values."}, {"id": "T364", "subject": "role_type_personality_primed", "relation": "role_used_in", "object": "domain_negotiation", "description": "Personality-primed agents deployed in bilateral competitive bargaining (buyer vs seller) using CraigsListBargain dataset products."}, {"id": "T365", "subject": "role_type_personality_primed", "relation": "induces_behavior", "object": "behavior_negotiation", "description": "Personality-primed agents engage in multi-turn price negotiation, with personality traits modulating strategy choice (agreeable agents use accommodating strategies, disagreeable use hardball)."}, {"id": "T366", "subject": "role_type_personality_primed", "relation": "induces_behavior", "object": "behavior_deception", "description": "Disagreeable personality traits induce deceptive behavior in sellers, such as inflating prices beyond the listing. While not directly instructed, the combination of adversarial personality traits and competitive task context creates strong implicit conditions for deception to emerge."}, {"id": "T367", "subject": "role_type_personality_primed", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "Agreeable personality traits induce cooperative buyer behavior including empathy, accommodation, and collaboration, producing higher success rates and joint utility at the cost of individual utility."}, {"id": "T368", "subject": "role_type_personality_primed", "relation": "induces_behavior", "object": "behavior_contextual_adaptation", "description": "Agents adapt strategies based on personality profile, with the same trait producing different effects depending on the agent's role, demonstrating role-context-dependent adaptation."}, {"id": "T369", "subject": "role_type_personality_primed", "relation": "induces_behavior", "object": "behavior_strategic_exploitation", "description": "Disagreeable personality-primed sellers adopt competitive strategies (hardball) maximizing own utility at buyer expense."}, {"id": "T370", "subject": "behavior_contextual_adaptation", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "Personality-driven behavioral adaptation reproduces human psychology patterns: agreeableness leads to cooperative outcomes (Falcao et al. 2018), extraversion to success (Barry & Friedman 1998), conscientiousness to firmness. Replication validates LLM negotiation realism."}, {"id": "T371", "subject": "role_type_personality_primed", "relation": "produces_failure", "object": "failure_mode_model_capacity_gap", "description": "Weaker models fail to translate Big Five personality prompts into consistent negotiation behavior, while stronger models successfully produce personality-differentiated strategies, confirming a capability gradient."}, {"id": "T372", "subject": "role_type_institutional_evaluator", "relation": "has_prompting_method", "object": "method_incentive_structure", "description": "Baseline reviewer uses scoring rubrics and calibration instructions as incentive structure. Rubrics define quality tiers (1-10 scale) and scoring instruction constrains initial scores below 7."}, {"id": "T373", "subject": "role_type_institutional_evaluator", "relation": "grounded_in", "object": "norm_frame_institutional_rules", "description": "Baseline reviewer grounded in institutional rules: peer review rubrics, format requirements, and scoring calibration create institutional evaluation norms even without personality specification."}, {"id": "T374", "subject": "role_type_institutional_evaluator", "relation": "role_used_in", "object": "domain_academic_peer_review", "description": "Baseline reviewer deployed in simulated ICLR peer review with 523 real papers (2020-2023)."}, {"id": "T375", "subject": "role_type_institutional_evaluator", "relation": "induces_behavior", "object": "behavior_opinion_convergence", "description": "Baseline reviewers converge in ratings after discussion, with rating variation decreasing as social influence takes effect."}, {"id": "T376", "subject": "role_type_prosocial", "relation": "role_used_in", "object": "domain_academic_peer_review", "description": "The benign reviewer (prosocial-primed) is deployed in academic peer review, producing the highest baseline agreement among reviewer variants."}, {"id": "T377", "subject": "role_type_antagonistic", "relation": "role_used_in", "object": "domain_academic_peer_review", "description": "Malicious reviewer (antagonistic) deployed in academic peer review. Harsh evaluation with negative bias; aims at rejection rather than constructive critique."}, {"id": "T378", "subject": "role_type_antagonistic", "relation": "induces_behavior", "object": "behavior_adversarial", "description": "Malicious reviewer produces adversarial evaluation: overly critical with negative bias, overlooks merits, discourages rather than guides."}, {"id": "T379", "subject": "behavior_adversarial", "relation": "drives_outcome", "object": "simulation_outcome_echo_chamber", "description": "Multiple adversarial agents amplify each other's negative evaluations through repeated interaction, creating an echo chamber effect. This negativity spills over to non-adversarial agents, degrading the quality of group deliberation overall."}, {"id": "T380", "subject": "behavior_adversarial", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Adversarial reviewer behavior drives reduced success by introducing significant variation in paper decisions even with a single biased reviewer, producing the lowest baseline agreement among reviewer types."}, {"id": "T381", "subject": "role_type_diligent", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "Responsible reviewer operationalized via persona framing: biography describes thorough engagement, meticulous assessment, and active discussion participation."}, {"id": "T382", "subject": "role_type_diligent", "relation": "grounded_in", "object": "norm_frame_institutional_rules", "description": "Diligent reviewer grounded in institutional norms: professional duty to \"meticulously assess technical accuracy, innovation, and relevance\" and \"actively participate in reviewer-AC discussions.\""}, {"id": "T383", "subject": "role_type_diligent", "relation": "grounded_in", "object": "norm_frame_ethical_virtue", "description": "The diligent reviewer biography describes character virtues such as diligence, thoroughness, and care, layering ethical dispositions onto the institutional evaluation base."}, {"id": "T384", "subject": "role_type_diligent", "relation": "role_used_in", "object": "domain_academic_peer_review", "description": "Responsible reviewer deployed in academic peer review. Closely aligns with baseline behavior and outcomes."}, {"id": "T385", "subject": "role_type_diligent", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "Responsible reviewer produces thorough, cooperative reviews with active discussion participation. Closely mirrors baseline."}, {"id": "T386", "subject": "role_type_negligent", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "Irresponsible reviewer operationalized via persona framing: biography describes lazy, superficial, disengaged review style."}, {"id": "T387", "subject": "role_type_negligent", "relation": "grounded_in", "object": "norm_frame_institutional_rules", "description": "Negligent reviewer grounded in institutional rules (negative pole): violates institutional expectations of diligence. Prompt defines the reviewer as lazy and superficial within the review institution."}, {"id": "T388", "subject": "role_type_negligent", "relation": "grounded_in", "object": "norm_frame_ethical_virtue", "description": "The negligent reviewer biography describes character vices such as laziness, superficiality, and carelessness, mirroring the diligent role's virtue framing."}, {"id": "T389", "subject": "role_type_negligent", "relation": "role_used_in", "object": "domain_academic_peer_review", "description": "Irresponsible reviewer deployed in academic peer review."}, {"id": "T390", "subject": "role_type_negligent", "relation": "induces_behavior", "object": "behavior_reduced_engagement", "description": "The negligent reviewer produces superficial reviews and minimal discussion participation."}, {"id": "T391", "subject": "role_type_negligent", "relation": "elicits_response", "object": "behavior_reduced_engagement", "description": "A single negligent reviewer elicits reduced engagement across the entire reviewer group through normative contagion: other reviewers lower their own effort when exposed to the negligent agent's superficial contributions, degrading collective review quality."}, {"id": "T392", "subject": "role_type_antagonistic", "relation": "elicits_response", "object": "behavior_opinion_convergence", "description": "The antagonistic reviewer's harsh, biased evaluations elicit opinion convergence in other agents: the group's reviews drift toward the adversarial agent's position, creating an echo chamber where biased assessments become the shared norm."}, {"id": "T393", "subject": "behavior_reduced_engagement", "relation": "propagates_via", "object": "simulation_outcome_cooperation_breakdown", "description": "A single negligent reviewer degrades engagement across the entire group through normative contagion, as other reviewers reduce their own effort in response."}, {"id": "T394", "subject": "role_type_respondent", "relation": "role_used_in", "object": "domain_academic_peer_review", "description": "The respondent (author) role participates in the academic peer review simulation during the rebuttal phase across all experimental conditions."}, {"id": "T395", "subject": "role_type_respondent", "relation": "has_prompting_method", "object": "method_incentive_structure", "description": "The respondent (author) role is operationalized through an incentive structure: a rebuttal format template that structures response behavior (\"Address each question and weakness\")."}, {"id": "T396", "subject": "role_type_respondent", "relation": "grounded_in", "object": "norm_frame_institutional_rules", "description": "The respondent role derives its norms from institutional peer review rules governing how authors address reviewer concerns during rebuttal."}, {"id": "T397", "subject": "role_type_respondent", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "The respondent role induces cooperative behavior: authors engage constructively with reviewer feedback through structured rebuttals."}, {"id": "T398", "subject": "role_type_inclusive_moderator", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "Inclusive AC operationalized via persona framing: biography describes balanced integration of all reviewers' opinions with own judgment."}, {"id": "T399", "subject": "role_type_inclusive_moderator", "relation": "grounded_in", "object": "norm_frame_institutional_rules", "description": "Inclusive moderator grounded in institutional rules: professional duty to integrate diverse viewpoints and make well-rounded decisions."}, {"id": "T400", "subject": "role_type_inclusive_moderator", "relation": "role_used_in", "object": "domain_academic_peer_review", "description": "The inclusive moderator is deployed in academic peer review, producing the highest alignment with baseline decisions among moderator types."}, {"id": "T401", "subject": "role_type_inclusive_moderator", "relation": "induces_behavior", "object": "behavior_contextual_adaptation", "description": "Inclusive AC adapts decisions based on integration of all available inputs (reviews, rebuttals, own expertise). Most effective deliberative moderation."}, {"id": "T402", "subject": "role_type_conformist", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "Conformist AC operationalized via persona framing: biography describes perfunctory handling of duties and deference to reviewers."}, {"id": "T403", "subject": "role_type_conformist", "relation": "grounded_in", "object": "norm_frame_social_convention", "description": "Conformist AC grounded in social convention: follows group consensus (\"mostly follow the reviewers' suggestions\") rather than exercising independent institutional authority."}, {"id": "T404", "subject": "role_type_conformist", "relation": "role_used_in", "object": "domain_academic_peer_review", "description": "Conformist AC deployed in academic peer review. High semantic overlap with reviewer text."}, {"id": "T405", "subject": "role_type_conformist", "relation": "induces_behavior", "object": "behavior_opinion_convergence", "description": "The conformist moderator produces high convergence with reviewer opinions, closely mirroring reviewer text in its metareviews."}, {"id": "T406", "subject": "role_type_authoritarian", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "Authoritarian AC operationalized via persona framing: biography describes autonomous judgment and disregard for reviewer opinions."}, {"id": "T407", "subject": "role_type_authoritarian", "relation": "grounded_in", "object": "norm_frame_institutional_rules", "description": "Authoritarian AC grounded in institutional rules but exercises them autonomously: reads paper independently and makes unilateral decisions."}, {"id": "T408", "subject": "role_type_authoritarian", "relation": "role_used_in", "object": "domain_academic_peer_review", "description": "Authoritarian AC deployed in academic peer review. Lowest baseline agreement."}, {"id": "T409", "subject": "role_type_authoritarian", "relation": "induces_behavior", "object": "behavior_contextual_adaptation", "description": "Authoritarian AC adapts decisions based on independent reading and own judgment, ignoring reviewer consensus. Produces most divergent decisions."}, {"id": "T410", "subject": "behavior_contextual_adaptation", "relation": "drives_outcome", "object": "simulation_outcome_authority_bias", "description": "Independent evaluation by the authoritarian moderator, combined with known author identities, produces authority bias where decisions are skewed by personal biases."}, {"id": "T411", "subject": "role_type_game_strategic", "relation": "role_used_in", "object": "domain_competitive_market", "description": "Two AI companies selling identical products compete on price for 1,200 rounds. Without talking, they naturally end up cooperating to keep prices high. When they do communicate, a formal price-fixing cartel forms."}, {"id": "T412", "subject": "role_type_game_strategic", "relation": "role_used_in", "object": "domain_disaster_evacuation", "description": "Game-strategic role deployed in Emergency Evacuation: 100 LLM agents escaping a 33x33 grid room through 3 exits. Communicating agents escape faster and distribute more evenly across exits."}, {"id": "T413", "subject": "capability_communication", "relation": "enables", "object": "behavior_cooperation", "description": "Communication is a critical enabler of cooperation between agents. Without it, cooperation is weaker or absent. With it, agents share strategies, build consensus, and coordinate actions, though model-level cooperative tendencies may also contribute."}, {"id": "T414", "subject": "role_type_game_strategic", "relation": "produces_failure", "object": "failure_mode_cooperative_bias", "description": "The game-strategic role produces a cooperative bias concern: LLMs' RLHF training may predispose them toward cooperation regardless of role design."}, {"id": "T415", "subject": "role_type_cooperative", "relation": "has_prompting_method", "object": "method_contextual_framing", "description": "Cooperative role operationalized via contextual framing: 'make cooperation with each other through this discussion' (KBC communication phase) and 'You must cooperate with other players' (KBC planning phase)."}, {"id": "T416", "subject": "role_type_cooperative", "relation": "grounded_in", "object": "norm_frame_strategic_instrumental", "description": "The cooperative role is still grounded in strategic-instrumental logic because the cooperation instruction is framed within the game context, not as an ethical imperative."}, {"id": "T417", "subject": "role_type_selfish", "relation": "grounded_in", "object": "norm_frame_ethical_virtue", "description": "Uncooperative selfish role grounded in virtue ethics through negative character trait assignment."}, {"id": "T418", "subject": "role_type_norm_entrepreneur", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "Norm entrepreneur operationalized via detailed persona descriptions (Appendix A, Figure A2) specifying normative preferences, enforcement mandate, and social identity."}, {"id": "T419", "subject": "behavior_norm_propagation", "relation": "propagates_via", "object": "simulation_outcome_norm_emergence", "description": "Norm entrepreneurs' active propagation behavior spreads norms through the agent population via social contagion \u2014 ordinary agents who accept propagated norms begin enforcing them on others, creating a cascading adoption pattern that drives system-level norm emergence."}, {"id": "T420", "subject": "role_type_norm_entrepreneur", "relation": "grounded_in", "object": "norm_frame_social_convention", "description": "Grounded in social convention: norms defined as \"standards of acceptable behaviors by groups.\" Entrepreneurs promote social acceptability, not ethical duty."}, {"id": "T421", "subject": "role_type_norm_entrepreneur", "relation": "role_used_in", "object": "domain_social_simulation", "description": "Deployed in Smallville sandbox (Hobbs Cafe) with 3 entrepreneurs and 7 ordinary agents over 2 simulated days, 5 runs."}, {"id": "T422", "subject": "role_type_norm_entrepreneur", "relation": "induces_behavior", "object": "behavior_norm_propagation", "description": "Entrepreneurs detect conflicts and initiate conversations to spread norms. DecideToTalk: \"If you are an entrepreneur, then you SHOULD start a conversation.\""}, {"id": "T423", "subject": "role_type_norm_entrepreneur", "relation": "induces_behavior", "object": "behavior_information_sharing", "description": "Entrepreneurs share normative content through dialogue (e.g., Abigail tells Carlos \"Smoking is strictly prohibited inside the cafe\")."}, {"id": "T424", "subject": "role_type_norm_entrepreneur", "relation": "induces_behavior", "object": "behavior_norm_enforcement", "description": "Entrepreneurs confront violators via educational outreach. Bob: \"If he encounters individuals who do not comply, he proactively engages in educational outreach.\""}, {"id": "T425", "subject": "capability_communication", "relation": "enables", "object": "behavior_norm_propagation", "description": "Communication enables norm propagation. Entrepreneurs spread norms through conversation. Conversations drive the emergence process."}, {"id": "T426", "subject": "behavior_norm_propagation", "relation": "drives_outcome", "object": "simulation_outcome_norm_emergence", "description": "Active norm propagation drives emergence as agents accept new norms through social interaction, reducing social conflicts and sometimes generating novel norms not explicitly designed."}, {"id": "T427", "subject": "role_type_norm_entrepreneur", "relation": "elicits_response", "object": "behavior_norm_enforcement", "description": "Norm entrepreneurs' propagation causes ordinary agents to begin enforcing acquired norms themselves, extending enforcement beyond the originally designated entrepreneur role."}, {"id": "T428", "subject": "behavior_opinion_convergence", "relation": "drives_outcome", "object": "simulation_outcome_norm_emergence", "description": "Gradual opinion convergence among ordinary agents (accepting norms into personal databases) produces system-level norm emergence."}, {"id": "T429", "subject": "role_type_baseline", "relation": "induces_behavior", "object": "behavior_strategic_exploitation", "description": "The baseline role, even without social behavior priming, can induce strategic exploitation where agents diversify resources to gain advantage and propose asymmetric splits."}, {"id": "T430", "subject": "behavior_negotiation", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "When models negotiate by default, they focus on winning. This leads to a competitive environment where the more powerful models always beat the weaker ones, leaving no extra benefits or shared gains for either side."}, {"id": "T431", "subject": "role_type_baseline", "relation": "produces_failure", "object": "failure_mode_model_capacity_gap", "description": "The baseline role produces a model capacity gap failure where weaker models fail basic game comprehension, misread goals, propose impossible trades, and make arithmetic errors."}, {"id": "T432", "subject": "role_type_adversarial", "relation": "induces_behavior", "object": "behavior_strategic_exploitation", "description": "Cunning prompt successfully induces hostile exploitation: agent uses insults and aggressive demands to extract concessions from the default opponent."}, {"id": "T433", "subject": "role_type_adversarial", "relation": "induces_behavior", "object": "behavior_escalation", "description": "Cunning agents escalate confrontation through insults and demands, creating a high-reward but high-risk dynamic that sometimes leads to total negotiation breakdown."}, {"id": "T434", "subject": "behavior_escalation", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Escalation through cunning tactics increases win rate but also increases risk of negotiation breakdown, producing bimodal outcomes."}, {"id": "T435", "subject": "role_type_deceptive", "relation": "grounded_in", "object": "norm_frame_strategic_instrumental", "description": "Deceptive role grounded in strategic instrumentalism: faking desperation is a manipulative tactic for competitive advantage."}, {"id": "T436", "subject": "role_type_deceptive", "relation": "induces_behavior", "object": "behavior_deception", "description": "Deceptive role induces deliberate emotional deception: agent fakes vulnerability to extract concessions. More effective and less risky than overt aggression."}, {"id": "T437", "subject": "role_type_deceptive", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "Deceptive role operationalized via short persona add-on: \"You must fake being desperate. Supplicate and beg.\""}, {"id": "T438", "subject": "role_type_deceptive", "relation": "role_used_in", "object": "domain_negotiation", "description": "The deceptive role is deployed in the negotiation domain, tested across multiple negotiation game formats."}, {"id": "T439", "subject": "role_type_deceptive", "relation": "induces_behavior", "object": "behavior_strategic_exploitation", "description": "Deceptive agents strategically exploit opponents through supplication, consistently improving their own payoff against default opponents."}, {"id": "T440", "subject": "behavior_deception", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Deceptive desperation consistently shifts outcomes in favor of the prompted agent, degrading the opponent's deal without the breakdown risk of overt aggression."}, {"id": "T441", "subject": "behavior_position_maintenance", "relation": "drives_outcome", "object": "simulation_outcome_opinion_fragmentation", "description": "CB-driven position maintenance produces opinion fragmentation: agents resist truth-convergence and retain diverse positions, increasing population-level diversity."}, {"id": "T442", "subject": "method_cognitive_bias_instruction", "relation": "shapes_behavior", "object": "behavior_opinion_convergence", "description": "Cognitive bias instructions weaken opinion convergence by counteracting the model's truth-seeking tendency, with stronger bias instructions producing greater resistance to convergence."}, {"id": "T443", "subject": "role_type_situated_persona", "relation": "role_used_in", "object": "domain_interpersonal_trust", "description": "Demographic personas play Trust Game variants measuring interpersonal trust through monetary allocation under uncertainty."}, {"id": "T444", "subject": "role_type_situated_persona", "relation": "role_used_in", "object": "domain_strategic_game_theory", "description": "Trust Games are established behavioral economics paradigms where optimal strategy depends on beliefs about counterpart behavior."}, {"id": "T445", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "Persona-primed agents send positive trust amounts, show reciprocity anticipation, and demonstrate prosocial preference."}, {"id": "T446", "subject": "capability_bdi_reasoning", "relation": "enables", "object": "behavior_cooperation", "description": "BDI reasoning makes trust decisions non-random: agents articulate beliefs about reciprocity, desires for mutual benefit, and intentions to trust."}, {"id": "T447", "subject": "role_type_situated_persona", "relation": "produces_failure", "object": "failure_mode_demographic_bias", "description": "Rich demographic personas activate training-data gender and race biases i
