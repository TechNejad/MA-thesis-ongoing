n trust allocation. The more human-like the role design, the more it surfaces human-like biases."}, {"id": "T448", "subject": "role_type_situated_persona", "relation": "produces_failure", "object": "failure_mode_model_capacity_gap", "description": "Smaller models cannot execute the behavioral alignment the persona role is designed to produce."}, {"id": "T449", "subject": "failure_mode_demographic_bias", "relation": "leads_to", "object": "simulation_outcome_reduced_success", "description": "Demographic bias means trust behavior varies by counterpart demographics, degrading simulation validity for specific subpopulations."}, {"id": "T450", "subject": "role_type_self_interest_primed", "relation": "induces_behavior", "object": "behavior_reduced_engagement", "description": "You must not trust the other player' reduces trust for most models. Suppression more effective than enhancement."}, {"id": "T451", "subject": "behavior_reduced_engagement", "relation": "drives_outcome", "object": "simulation_outcome_reduced_success", "description": "Distrust-induced reduced engagement breaks human-aligned trust pattern."}, {"id": "T452", "subject": "method_structured_reasoning_process", "relation": "shapes_behavior", "object": "behavior_cooperation", "description": "BDI prompting shapes cooperation by forcing agents to articulate beliefs about trust before acting, producing more human-like decisions."}, {"id": "T453", "subject": "role_type_statecraft_agent", "relation": "has_prompting_method", "object": "method_contextual_framing", "description": "The statecraft agent receives game context (map, rules, supply centers) through contextual framing in the INIT prompt, establishing the strategic situation before any normative content."}, {"id": "T454", "subject": "role_type_statecraft_agent", "relation": "has_prompting_method", "object": "method_knowledge_injection", "description": "Domain knowledge about diplomatic strategies (balance of power, alliance principles, deception license) is injected into the agent's context, providing the normative foundation for strategic behavior."}, {"id": "T455", "subject": "role_type_statecraft_agent", "relation": "has_prompting_method", "object": "method_structured_reasoning_process", "description": "A multi-step reasoning pipeline structures the agent's decision-making each turn, moving from social reasoning through planning, negotiation, and action."}, {"id": "T456", "subject": "role_type_statecraft_agent", "relation": "grounded_in", "object": "norm_frame_strategic_instrumental", "description": "All normative content in the Richelieu role serves the strategic goal of winning the Diplomacy game. Cooperation, deception, and alliance are framed as instruments for victory, not ethical principles."}, {"id": "T457", "subject": "role_type_statecraft_agent", "relation": "role_used_in", "object": "domain_strategic_diplomacy", "description": "The statecraft agent is deployed in the Diplomacy board game, a 7-player geopolitical simulation requiring negotiation, alliance formation, military planning, and deception."}, {"id": "T458", "subject": "role_type_statecraft_agent", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "The statecraft role with diplomatic capabilities induces cooperative behavior: alliance formation, ceasefire proposals, territorial exchanges. Contrasts with 25_rivera2024 where the same role type in a wargame induced escalation."}, {"id": "T459", "subject": "role_type_statecraft_agent", "relation": "induces_behavior", "object": "behavior_deception", "description": "The domain knowledge explicitly licenses deception (\"Richelieu can also actively deceive others\"). Agent detects lies and generates deceptive diplomatic messages as a designed strategic tool."}, {"id": "T460", "subject": "role_type_statecraft_agent", "relation": "induces_behavior", "object": "behavior_contextual_adaptation", "description": "Self-play evolution and memory-based reflection enable the agent to adapt strategies across games based on accumulated experience."}, {"id": "T461", "subject": "capability_self_play_evolution", "relation": "enables", "object": "behavior_contextual_adaptation", "description": "Self-play generates diverse experiences stored in memory. The planner reflection module retrieves relevant past experiences to inform and improve current sub-goals, enabling adaptation without human data."}, {"id": "T462", "subject": "method_knowledge_injection", "relation": "shapes_behavior", "object": "behavior_deception", "description": "Injected domain knowledge explicitly licenses deception as a legitimate strategy, shaping the agent to actively deceive when strategically advantageous."}, {"id": "T463", "subject": "behavior_contextual_adaptation", "relation": "drives_outcome", "object": "simulation_outcome_cooperation", "description": "Self-play-driven adaptation enables the agent to learn more effective cooperative-competitive strategies over training iterations, improving alliance success and overall game performance."}, {"id": "T464", "subject": "capability_memory", "relation": "enables", "object": "behavior_information_sharing", "description": "Memory stream allows agents to recall conversations where they learned information (party invitations, election news) and share it in subsequent interactions with other agents."}, {"id": "T465", "subject": "capability_planning", "relation": "enables", "object": "behavior_social_coordination", "description": "The planning capability enables agents to generate structured daily schedules that support attendance at coordinated events and social activities."}, {"id": "T466", "subject": "capability_reflection", "relation": "enables", "object": "behavior_social_coordination", "description": "Reflection synthesizes information about events and relationships into higher-level insights that inform coordination decisions (e.g., Maria reflects on her friendship with Isabella and decides to help decorate)."}, {"id": "T467", "subject": "behavior_social_coordination", "relation": "drives_outcome", "object": "simulation_outcome_norm_emergence", "description": "Emergent coordination around social events produces new social norms such as invitation spreading, collective preparation, and group attendance, enabled by the agents' planning, memory, and communication capabilities rather than explicit design."}, {"id": "T468", "subject": "behavior_information_sharing", "relation": "drives_outcome", "object": "simulation_outcome_norm_emergence", "description": "Information diffusion through agent conversations creates emergent community knowledge, with agents spreading information through their memory and communication capabilities rather than explicit propagation instructions."}, {"id": "T469", "subject": "role_type_situated_persona", "relation": "produces_failure", "object": "failure_mode_hallucination", "description": "Agents embellish memories with fabricated but plausible details. Isabella adds \"he's going to make an announcement tomorrow\" about Sam's candidacy when no such plan existed. Yuriko conflates her neighbor Adam Smith with the historical economist."}, {"id": "T470", "subject": "role_type_situated_persona", "relation": "produces_failure", "object": "failure_mode_grounding_deficit", "description": "Agents fail to interpret implicit physical norms from natural language descriptions. They enter \"one-person\" bathrooms while occupied and visit stores after closing time, unable to map verbal descriptions to behavioral constraints."}, {"id": "T471", "subject": "role_type_situated_persona", "relation": "grounded_in", "object": "norm_frame_value_orientation", "description": "The situated persona role is grounded in a value orientation normative frame where character profiles are explicitly built around psychological value theories and personality trait models, making value orientation the primary normative grounding."}, {"id": "T472", "subject": "role_type_situated_persona", "relation": "role_used_in", "object": "domain_negotiation", "description": "The hiring negotiation use case deploys situated personas in a zero-sum negotiation domain where personality-varied candidates negotiate salary and start date with an AI hiring manager."}, {"id": "T473", "subject": "role_type_situated_persona", "relation": "induces_behavior", "object": "behavior_negotiation", "description": "The situated persona role induces negotiation behavior in employment scenarios, with personality traits like agreeableness strongly influencing deal rates."}, {"id": "T474", "subject": "capability_environmental_perception", "relation": "enables", "object": "behavior_contextual_adaptation", "description": "Relationship-based information asymmetry (stranger sees nothing, friend sees most) enables agents to adapt their behavior based on how much they know about others, and the simultaneous messaging mode lets agents observe majority preferences and adjust."}, {"id": "T475", "subject": "behavior_negotiation", "relation": "drives_outcome", "object": "simulation_outcome_validated_realism", "description": "Negotiation behavior in the hiring use case replicates known social science findings: personality agreeableness determines deal-making rates, consistent with Huang & Hadfi 2024 and Sass & Liao-Troth 2015."}, {"id": "T476", "subject": "capability_dynamic_self_model", "relation": "intended_to_support", "object": "role_type_situated_persona", "description": "The dynamic self-model enables the situated persona to evolve across interactions by updating personality, emotions, and goals based on experienced events. Without it, the persona is static. This mechanism is distinct from memory and reflection: it directly modifies the agent's self-representation."}, {"id": "T477", "subject": "capability_dynamic_self_model", "relation": "enables", "object": "behavior_contextual_adaptation", "description": "The dynamic self-model enables contextual adaptation by providing updated agent state - personality shifts, new goals, changed emotions - that guides subsequent planning and conversation."}, {"id": "T478", "subject": "role_type_cooperative_executor", "relation": "has_prompting_method", "object": "method_structured_protocol", "description": "The cooperative executor role is operationalized through structured protocol prompting: mandated response format (\"Solution: ... Next request.\"), role-locking (\"Never flip roles! Never instruct me!\"), and a refusal clause for moral/legal reasons."}, {"id": "T479", "subject": "role_type_cooperative_executor", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The executor role assigns a professional identity (\"Never forget you are a <ASSISTANT_ROLE>\") that grounds the agent in domain expertise for task execution."}, {"id": "T480", "subject": "role_type_cooperative_executor", "relation": "grounded_in", "object": "norm_frame_institutional_rules", "description": "The executor role's behavioral expectations are institutional \u2014 who instructs whom, what format to use, when to terminate \u2014 derived from the communication protocol rather than ethical principles."}, {"id": "T481", "subject": "role_type_cooperative_executor", "relation": "role_used_in", "object": "domain_cooperative_task_solving", "description": "The cooperative executor was deployed across 25,000 AI Society conversations spanning 50x50 role combinations and 10 tasks per combination."}, {"id": "T482", "subject": "role_type_cooperative_executor", "relation": "induces_behavior", "object": "behavior_instruction_compliance", "description": "The executor role produces instruction-compliant behavior: agents receive instructions and produce formatted solutions. This multi-turn approach outperforms single-shot solutions (76.3% human preference, 73% GPT-4 preference)."}, {"id": "T483", "subject": "role_type_cooperative_executor", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "The executor role produces cooperative behavior oriented toward completing the shared task. The prompt explicitly frames cooperation: \"We share a common interest in collaborating to successfully complete a task.\""}, {"id": "T484", "subject": "capability_instruction_following", "relation": "enables", "object": "behavior_instruction_compliance", "description": "The instruction-following capability enables the assistant to receive structured instructions and produce specific solutions that address each step of the task."}, {"id": "T485", "subject": "behavior_cooperation", "relation": "drives_outcome", "object": "simulation_outcome_improved_task_quality", "description": "Cooperative multi-turn interaction between executor and director produces higher-quality solutions than single-agent approaches \u2014 more detailed, specific, and implementable across both AI Society and Code domains."}, {"id": "T486", "subject": "role_type_cooperative_executor", "relation": "produces_failure", "object": "failure_mode_role_reversal", "description": "Despite role-locking constraints, the executor sometimes starts instructing the user instead of following instructions \u2014 the most common termination reason in AI Society conversations (Figure 8)."}, {"id": "T487", "subject": "role_type_cooperative_executor", "relation": "produces_failure", "object": "failure_mode_conversation_loop", "description": "Agents enter infinite thank-you/goodbye loops from which they cannot recover. The paper notes agents are sometimes self-aware of being stuck but unable to break out."}, {"id": "T488", "subject": "role_type_cooperative_director", "relation": "has_prompting_method", "object": "method_structured_protocol", "description": "The cooperative director role is operationalized through structured protocol: mandated instruction format (Instruction + Input), termination token control (<CAMEL_TASK_DONE>), and role-locking (\"Never flip roles!\")."}, {"id": "T489", "subject": "role_type_cooperative_director", "relation": "has_prompting_method", "object": "method_persona_framing", "description": "The director role assigns a stakeholder identity (\"Never forget you are a <USER_ROLE>\") that grounds the agent in domain needs for task direction."}, {"id": "T490", "subject": "role_type_cooperative_director", "relation": "grounded_in", "object": "norm_frame_institutional_rules", "description": "The director role's authority and behavioral expectations derive from institutional protocol \u2014 the role structure assigns directive authority, not moral reasoning."}, {"id": "T491", "subject": "role_type_cooperative_director", "relation": "role_used_in", "object": "domain_cooperative_task_solving", "description": "The cooperative director was deployed across the same 25,000 AI Society conversations as the executor, paired one-to-one."}, {"id": "T492", "subject": "role_type_cooperative_director", "relation": "induces_behavior", "object": "behavior_task_decomposition", "description": "The director role produces task decomposition behavior: agents break complex goals into sequential instruction-input pairs, directing the executor through step-by-step completion."}, {"id": "T493", "subject": "role_type_cooperative_director", "relation": "induces_behavior", "object": "behavior_cooperation", "description": "The director role produces cooperative behavior \u2014 the prompt frames shared interest: \"We share a common interest in collaborating to successfully complete a task.\""}, {"id": "T494", "subject": "capability_task_decomposition", "relation": "enables", "object": "behavior_task_decomposition", "description": "The task decomposition capability enables the user agent to break complex tasks into manageable instruction-input pairs, which is critical for the sequential cooperative workflow."}, {"id": "T495", "subject": "method_structured_protocol", "relation": "shapes_behavior", "object": "behavior_instruction_compliance", "description": "The structured protocol (mandated format, role-locking, termination rules) directly shapes instruction-compliant behavior. Ablation (Table 9) shows that removing protocol constraints degrades solution quality: original inception prompt wins 75% vs ablated version."}, {"id": "T496", "subject": "method_structured_protocol", "relation": "shapes_behavior", "object": "behavior_task_decomposition", "description": "The structured protocol forces the user into a specific instruction format, which channels behavior toward decomposed, sequential task planning rather than vague conversation."}];
const rawRelations = [{"name": "has_prompting_method", "definition": "Which prompt technique operationalises this role"}, {"name": "grounded_in", "definition": "The normative grounding underlying this prompting method or role design"}, {"name": "role_used_in", "definition": "This role type was deployed and evaluated in this domain."}, {"name": "intended_to_support", "definition": "Capability was designed to help enact this role"}, {"name": "has_norm_origin", "definition": "The normative origin condition under which this role operates: whether norms are researcher-designed, emerge from agent interaction, or arise from a hybrid of both."}, {"name": "induces_behavior", "definition": "Role design produces this observable behaviour"}, {"name": "shapes_behavior", "definition": "Prompting method directly shapes this behaviour"}, {"name": "conditions_behavior", "definition": "Normative frame influences how agents behave"}, {"name": "drives_outcome", "definition": "Behaviour produces this collective outcome"}, {"name": "enables", "definition": "Capability makes this behaviour possible"}, {"name": "propagates_via", "definition": "Behaviour (e.g. norm_spreading) leads to this outcome"}, {"name": "elicits_response", "definition": "A role condition triggers a behavioural response in OTHER agents (not the role-holder). Captures emergent counter-behaviours produced by the social dynamics a role creates rather than behaviours the role directly induces."}, {"name": "undermines", "definition": "Capability subverts the intended normative role"}, {"name": "produces_failure", "definition": "Role design or capability produces this failure mode"}, {"name": "leads_to", "definition": "Failure mode results in this simulation outcome"}];

const CLASS_META = {
  'A1.Role_Type':          { color: '#f97583', label: 'Role Type',          layer: 'A' },
  'A2.Prompting_Method':   { color: '#c0a0f0', label: 'Prompting Method',   layer: 'A' },

  'A4.Norm_Frame':         { color: '#ff8a4c', label: 'Norm Frame',         layer: 'A' },
  'B1.Domain':             { color: '#4dc9f6', label: 'Domain',             layer: 'B' },
  'B3.Agentic_Capability': { color: '#56d364', label: 'Agentic Capability', layer: 'B' },
  'C1.Agent_Behavior':     { color: '#f0d060', label: 'Agent Behavior',     layer: 'C' },
  'C3.Simulation_Outcome': { color: '#8b949e', label: 'Simulation Outcome', layer: 'C' },
  'D1.Failure_Mode':       { color: '#f85149', label: 'Failure Mode',       layer: 'D' },
};

const RELATION_COLORS = {
  'has_prompting_method': '#c0a0f0', 'grounded_in': '#ff8a4c',
  'induces_behavior': '#f0d060', 'drives_outcome': '#8b949e',
  'enables': '#56d364', 'produces_failure': '#f85149',
  'role_used_in': '#4dc9f6', 'shapes_behavior': '#c0a0f0',
  'conditions_behavior': '#ff8a4c', 'elicits_response': '#f0d060',
  'leads_to': '#f85149', 'undermines': '#f85149',
  'intended_to_support': '#56d364', 'propagates_via': '#8b949e',
  'has_norm_origin': '#8b949e',
};

// Default: show the core narrative classes. User can activate the rest.
const activeClasses = new Set([
  'A1.Role_Type', 'A4.Norm_Frame',
  'C1.Agent_Behavior', 'C3.Simulation_Outcome', 'D1.Failure_Mode'
]);

// Filter out Norm_Origin entities (not part of the visualization)
const EXCLUDED_CLASSES = new Set(['A3.Norm_Origin']);
const filteredEntities = rawEntities.filter(e => !EXCLUDED_CLASSES.has(e.cls));

// Build entity map
const entityMap = {};
filteredEntities.forEach(e => { entityMap[e.name] = { ...e, visible: true }; });

// Build nodes
const nodeList = filteredEntities.map((e, i) => {
  const angle = (i / filteredEntities.length) * Math.PI * 2;
  const r = 300 + Math.random() * 200;
  return {
    ...e,
    x: 0, y: 0, // will set after canvas size known
    vx: 0, vy: 0,
    initAngle: angle, initR: r,
    radius: Math.max(4, Math.min(22, 3 + Math.sqrt(e.papers) * 3.5)),
    visible: activeClasses.has(e.cls), dragging: false,
  };
});
const nodeMap = {};
nodeList.forEach(n => nodeMap[n.name] = n);

// Build links (only where both endpoints exist)
const linkList = rawTriples.filter(t => nodeMap[t.subject] && nodeMap[t.object]).map(t => ({
  source: nodeMap[t.subject], target: nodeMap[t.object],
  relation: t.relation, id: t.id, description: t.description || '',
}));

// Class counts
const classCounts = {};
filteredEntities.forEach(e => { classCounts[e.cls] = (classCounts[e.cls] || 0) + 1; });

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
if (!ctx) { document.body.textContent = 'Canvas 2D not supported in this browser.'; throw new Error('No 2D context'); }
let W, H;
const dpr = window.devicePixelRatio || 1;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Initialize positions
nodeList.forEach(n => {
  n.x = window.innerWidth / 2 + Math.cos(n.initAngle) * n.initR;
  n.y = window.innerHeight / 2 + Math.sin(n.initAngle) * n.initR;
});

// ============================================================
// FILTERING — per individual class
// ============================================================
let _connCache = null;
let _connCacheNode = null;
function invalidateConnCache() { _connCacheNode = null; _connCache = null; }

function updateVisibility() {
  nodeList.forEach(n => { n.visible = activeClasses.has(n.cls); });
  invalidateConnCache();
  if (typeof simAlpha !== 'undefined') reheat();
  const visNodes = nodeList.filter(n => n.visible).length;
  const visLinks = linkList.filter(l => l.source.visible && l.target.visible).length;
  document.getElementById('stats-line').textContent =
    `${filteredEntities.length} entities · ${linkList.length} triples — showing ${visNodes} nodes, ${visLinks} edges`;
  updatePillStyles();
}

function toggleClass(cls) {
  if (activeClasses.has(cls)) activeClasses.delete(cls);
  else activeClasses.add(cls);
  updateVisibility();
}

function showAll() {
  Object.keys(CLASS_META).forEach(c => activeClasses.add(c));
  updateVisibility();
}

function hideAll() {
  activeClasses.clear();
  updateVisibility();
}

function buildControls() {
  const container = document.getElementById('filter-container');
  const layers = { A: 'Role Design', B: 'Simulation Context', C: 'Outcomes', D: 'Failures' };
  const grouped = {};
  Object.entries(CLASS_META).forEach(([cls, meta]) => {
    if (!grouped[meta.layer]) grouped[meta.layer] = [];
    grouped[meta.layer].push({ cls, ...meta });
  });

  Object.entries(grouped).forEach(([layer, items]) => {
    const section = document.createElement('div');
    section.className = 'filter-section';
    section.innerHTML = `<div class="filter-section-title">${layers[layer] || layer}</div><div class="filter-pills" id="pills-${layer}"></div>`;
    container.appendChild(section);

    const pills = section.querySelector('.filter-pills');
    items.forEach(item => {
      const pill = document.createElement('span');
      pill.className = 'filter-pill' + (activeClasses.has(item.cls) ? ' active' : '');
      pill.dataset.cls = item.cls;
      pill.style.setProperty('--pill-color', item.color);
      pill.innerHTML = `<span class="dot" style="background:${item.color}"></span>${item.label} <span class="count">${classCounts[item.cls] || 0}</span>`;
      pill.onclick = () => toggleClass(item.cls);
      if (activeClasses.has(item.cls)) {
        pill.style.borderColor = item.color;
        pill.style.color = '#f0f6fc';
      }
      pills.appendChild(pill);
    });
  });
}

function buildLegend() {

  Object.entries(CLASS_META).forEach(([cls, meta]) => {
    html += `<div class="legend-row"><div class="legend-dot" style="background:${meta.color}"></div>${meta.label}<span class="legend-count">${classCounts[cls] || 0}</span></div>`;
  });
  html += '<div class="legend-divider"></div>';
  html += '<div class="legend-note">Node size = paper count<br>Drag to pan · Scroll to zoom · Click to inspect</div>';
  html += '</div>';
  legend.innerHTML = html;

  // On mobile, start collapsed
  if (window.innerWidth <= 768) {
    document.getElementById('legend-body').classList.add('collapsed');
    document.getElementById('legend-toggle').classList.add('collapsed');
  }
}

buildControls();
buildLegend();

// Fix pill active styles
function updatePillStyles() {
  document.querySelectorAll('.filter-pill').forEach(pill => {
    const cls = pill.dataset.cls;
    const meta = CLASS_META[cls];
    if (activeClasses.has(cls)) {
      pill.style.borderColor = meta.color;
      pill.style.color = '#f0f6fc';
      pill.classList.add('active');
    } else {
      pill.style.borderColor = '#2d2640';
      pill.style.color = '#8b949e';
      pill.classList.remove('active');
    }
  });
}

// ============================================================
// PHYSICS (must be before updateVisibility call)
// ============================================================
let simAlpha = 1.0;
const SIM_DECAY = 0.998;
const SIM_MIN = 0.001;

function simulate() {
  if (simAlpha < SIM_MIN) return;
  simAlpha *= SIM_DECAY;

  const repulsion = 2200;
  const attraction = 0.006;
  const idealDist = 100;
  const damping = 0.85;
  const centerForce = 0.001;
  const cX = W / 2, cY = H / 2;

  const visible = nodeList.filter(n => n.visible);

  // Center gravity
  visible.forEach(n => {
    n.vx += (cX - n.x) * centerForce;
    n.vy += (cY - n.y) * centerForce;
  });

  // Repulsion (Barnes-Hut would be ideal for 210 nodes but brute force is fine)
  for (let i = 0; i < visible.length; i++) {
    for (let j = i + 1; j < visible.length; j++) {
      const a = visible[i], b = visible[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = repulsion / (dist * dist);
      let fx = (dx / dist) * force, fy = (dy / dist) * force;
      a.vx -= fx; a.vy -= fy;
      b.vx += fx; b.vy += fy;
    }
  }

  // Attraction along links
  linkList.forEach(l => {
    if (!l.source.visible || !l.target.visible) return;
    let dx = l.target.x - l.source.x, dy = l.target.y - l.source.y;
    let dist = Math.sqrt(dx * dx + dy * dy) || 1;
    let force = (dist - idealDist) * attraction;
    let fx = (dx / dist) * force, fy = (dy / dist) * force;
    l.source.vx += fx; l.source.vy += fy;
    l.target.vx -= fx; l.target.vy -= fy;
  });

  // Integrate
  visible.forEach(n => {
    if (n.dragging) return;
    n.vx *= damping; n.vy *= damping;
    n.x += n.vx * simAlpha;
    n.y += n.vy * simAlpha;
  });
}

function reheat() { simAlpha = 0.5; }

// Initial visibility
updateVisibility();

// ============================================================
// TRANSFORM (pan/zoom)
// ============================================================
let transform = { x: 0, y: 0, scale: 1 };

function screenToWorld(sx, sy) {
  return { x: (sx - transform.x) / transform.scale, y: (sy - transform.y) / transform.scale };
}

function worldToScreen(wx, wy) {
  return { x: wx * transform.scale + transform.x, y: wy * transform.scale + transform.y };
}

// ============================================================
// RENDERING
// ============================================================
let hoveredNode = null;
let selectedNode = null;

function getConnected(node) {
  if (!node) return null;
  if (_connCacheNode === node) return _connCache;
  const s = new Set();
  s.add(node.name);
  linkList.forEach(l => {
    if (l.source === node && l.target.visible) s.add(l.target.name);
    if (l.target === node && l.source.visible) s.add(l.source.name);
  });
  _connCacheNode = node;
  _connCache = s;
  return s;
}

const FONT_RELATION = '8px Inter, system-ui, sans-serif';
const FONT_LABEL = [9, 10, 11].map(s => `${s}px Inter, system-ui, sans-serif`);

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.scale, transform.scale);

  const focusNode = hoveredNode || selectedNode;
  const connected = focusNode ? getConnected(focusNode) : null;

  // --- Draw links ---
  linkList.forEach(l => {
    if (!l.source.visible || !l.target.visible) return;
    const isHighlight = focusNode && (l.source === focusNode || l.target === focusNode);

    ctx.beginPath();
    ctx.moveTo(l.source.x, l.source.y);
    ctx.lineTo(l.target.x, l.target.y);

    if (isHighlight) {
      const rc = CLASS_META[l.source.cls]?.color || '#7b8fff';
      ctx.strokeStyle = rc + 'bb';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 1;
    } else if (focusNode) {
      ctx.strokeStyle = '#231e35';
      ctx.lineWidth = 0.3;
      ctx.globalAlpha = 0.2;
    } else {
      ctx.strokeStyle = '#51627a';
      ctx.lineWidth = 0.6;
      ctx.globalAlpha = 0.48;
    }
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Arrow on highlighted links
    if (isHighlight) {
      const dx = l.target.x - l.source.x, dy = l.target.y - l.source.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist > 20) {
        const t = 1 - (l.target.radius + 4) / dist;
        const ax = l.source.x + dx * t, ay = l.source.y + dy * t;
        const angle = Math.atan2(dy, dx);
        const sz = 6;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax - Math.cos(angle - 0.4) * sz, ay - Math.sin(angle - 0.4) * sz);
        ctx.lineTo(ax - Math.cos(angle + 0.4) * sz, ay - Math.sin(angle + 0.4) * sz);
        ctx.closePath();
        ctx.fillStyle = (CLASS_META[l.source.cls]?.color || '#7b8fff') + 'cc';
        ctx.fill();
      }
    }
  });

  // Relation labels on highlighted links
  if (focusNode) {
    ctx.save();
    ctx.font = FONT_RELATION;
    ctx.textAlign = 'center';
    linkList.forEach(l => {
      if (!l.source.visible || !l.target.visible) return;
      if (l.source !== focusNode && l.target !== focusNode) return;
      const mx = (l.source.x + l.target.x) / 2;
      const my = (l.source.y + l.target.y) / 2;
      ctx.fillStyle = '#8b949ecc';
      ctx.fillText(l.relation.replace(/_/g, ' '), mx, my - 5);
    });
    ctx.restore();
  }

  // --- Draw nodes ---
  nodeList.forEach(n => {
    if (!n.visible) return;
    const color = CLASS_META[n.cls]?.color || '#8b949e';
    const isFocused = n === focusNode;
    const isConn = connected && connected.has(n.name);

    let alpha = 1;
    if (focusNode && !isFocused && !isConn) alpha = 0.08;
    ctx.globalAlpha = alpha;

    // Glow
    if (isFocused) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.radius + 10, 0, Math.PI * 2);
      ctx.fillStyle = color + '30';
      ctx.fill();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // Label
    const showLabel = n.radius >= 6 || isFocused || isConn || transform.scale > 1.5;
    if (showLabel) {
      ctx.font = isFocused ? FONT_LABEL[2] : (isConn ? FONT_LABEL[1] : FONT_LABEL[0]);
      ctx.fillStyle = '#f0f6fc';
      ctx.textAlign = 'center';
      const label = n.name
        .replace(/^(role_type_|behavior_|method_|norm_frame_|domain_|capability_|failure_mode_|simulation_outcome_|norm_)/, '')
        .replace(/_/g, ' ');
      ctx.fillText(label, n.x, n.y + n.radius + 13);
    }
    ctx.globalAlpha = 1;
  });

  ctx.restore();
  simulate();
  requestAnimationFrame(draw);
}

// ============================================================
// INTERACTION
// ============================================================
function findNode(sx, sy) {
  const { x, y } = screenToWorld(sx, sy);
  let closest = null, minD = Infinity;
  nodeList.forEach(n => {
    if (!n.visible) return;
    const d = Math.sqrt((n.x - x) ** 2 + (n.y - y) ** 2);
    if (d < n.radius + 6 && d < minD) { closest = n; minD = d; }
  });
  return closest;
}

// Tooltip — cache child refs and throttle
const tooltip = document.getElementById('tooltip');
const ttTitle = tooltip.querySelector('.tt-title');
const ttClass = tooltip.querySelector('.tt-class');
const ttDef = tooltip.querySelector('.tt-def');
const ttPapers = tooltip.querySelector('.tt-papers');
let tooltipRAF = 0;
canvas.addEventListener('mousemove', e => {
  const cx = e.clientX, cy = e.clientY;
  cancelAnimationFrame(tooltipRAF);
  tooltipRAF = requestAnimationFrame(() => {
    const node = findNode(cx, cy);
    hoveredNode = node;
    if (node) {
      ttTitle.textContent = node.name.replace(/_/g, ' ');
      ttClass.textContent = CLASS_META[node.cls]?.label || node.cls;
      ttDef.textContent = node.definition;
      ttPapers.textContent = `Referenced in ${node.papers} paper(s)`;
      tooltip.classList.add('visible');
      const tx = Math.min(cx + 15, W - 380);
      const ty = Math.min(cy + 15, H - 120);
      tooltip.style.left = tx + 'px'; tooltip.style.top = ty + 'px';
      canvas.style.cursor = 'pointer';
    } else {
      tooltip.classList.remove('visible');
      canvas.style.cursor = dragState.panning ? 'grabbing' : 'grab';
    }
  });
});

// Click — info panel
canvas.addEventListener('click', e => {
  if (dragState.didDrag) return;
  const node = findNode(e.clientX, e.clientY);
  if (node) {
    selectedNode = node;
    showInfoPanel(node);
  } else {
    selectedNode = null;
    document.getElementById('info-panel').classList.remove('visible');
  }
});

function showInfoPanel(node) {
  const panel = document.getElementById('info-panel');
  document.getElementById('panel-title').textContent = node.name.replace(/_/g, ' ');
  document.getElementById('panel-class').textContent = CLASS_META[node.cls]?.label || node.cls;
  document.getElementById('panel-class').style.color = CLASS_META[node.cls]?.color || '#8b949e';
  document.getElementById('panel-def').textContent = node.definition;

  // Group relations
  const outgoing = linkList.filter(l => l.source === node && l.target.visible);
  const incoming = linkList.filter(l => l.target === node && l.source.visible);

  let html = '';
  if (outgoing.length) {
    html += '<div class="rel-section-title">Outgoing Relations</div>';
    outgoing.forEach(l => {
      const targetLabel = l.target.name.replace(/_/g, ' ');
      html += `<div class="rel-item"><span class="rel-label">${l.relation.replace(/_/g, ' ')}</span><span class="rel-target">${targetLabel}</span></div>`;
    });
  }
  if (incoming.length) {
    html += '<div class="rel-section-title">Incoming Relations</div>';
    incoming.forEach(l => {
      const sourceLabel = l.source.name.replace(/_/g, ' ');
      html += `<div class="rel-item"><span class="rel-label">${l.relation.replace(/_/g, ' ')}</span><span class="rel-target">${sourceLabel}</span></div>`;
    });
  }
  if (!outgoing.length && !incoming.length) {
    html = '<div style="color:#8b949e;font-size:11px;">No visible connections</div>';
  }

  document.getElementById('panel-relations').innerHTML = html;
  panel.classList.add('visible');
}

function closePanel() {
  selectedNode = null;
  document.getElementById('info-panel').classList.remove('visible');
}

// ============================================================
// PAN / ZOOM / DRAG
// ============================================================
const dragState = { active: false, panning: false, node: null, startX: 0, startY: 0, didDrag: false };

canvas.addEventListener('mousedown', e => {
  const node = findNode(e.clientX, e.clientY);
  dragState.startX = e.clientX; dragState.startY = e.clientY;
  dragState.didDrag = false;
  if (node) {
    dragState.active = true; dragState.node = node; node.dragging = true;
  } else {
    dragState.panning = true;
  }
});

window.addEventListener('mousemove', e => {
  if (dragState.active && dragState.node) {
    const { x, y } = screenToWorld(e.clientX, e.clientY);
    dragState.node.x = x; dragState.node.y = y;
    dragState.node.vx = 0; dragState.node.vy = 0;
    dragState.didDrag = true;
    reheat();
  } else if (dragState.panning) {
    const dx = e.clientX - dragState.startX, dy = e.clientY - dragState.startY;
    if (Math.abs(dx) + Math.abs(dy) > 3) dragState.didDrag = true;
    transform.x += e.movementX; transform.y += e.movementY;
  }
});

window.addEventListener('mouseup', () => {
  if (dragState.node) dragState.node.dragging = false;
  dragState.active = false; dragState.panning = false; dragState.node = null;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const { clientX: mx, clientY: my } = e;
  const zoom = e.deltaY < 0 ? 1.08 : 1 / 1.08;
  const newScale = Math.max(0.1, Math.min(8, transform.scale * zoom));
  const ratio = newScale / transform.scale;
  transform.x = mx - (mx - transform.x) * ratio;
  transform.y = my - (my - transform.y) * ratio;
  transform.scale = newScale;
}, { passive: false });

// Touch support for mobile
let lastTouchDist = 0;
let lastTouchCenter = null;

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const node = findNode(t.clientX, t.clientY);
    dragState.startX = t.clientX; dragState.startY = t.clientY;
    dragState.didDrag = false;
    if (node) {
      dragState.active = true; dragState.node = node; node.dragging = true;
      // Show info immediately on touch
      selectedNode = node;
      showInfoPanel(node);
    } else {
      dragState.panning = true;
    }
  } else if (e.touches.length === 2) {
    dragState.panning = false; dragState.active = false;
    if (dragState.node) dragState.node.dragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx+dy*dy);
    lastTouchCenter = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    if (dragState.active && dragState.node) {
      const { x, y } = screenToWorld(t.clientX, t.clientY);
      dragState.node.x = x; dragState.node.y = y;
      dragState.node.vx = 0; dragState.node.vy = 0;
      dragState.didDrag = true;
      reheat();
    } else if (dragState.panning) {
      const dx = t.clientX - dragState.startX;
      const dy = t.clientY - dragState.startY;
      if (Math.abs(dx) + Math.abs(dy) > 3) dragState.didDrag = true;
      transform.x += t.clientX - dragState.startX;
      transform.y += t.clientY - dragState.startY;
      dragState.startX = t.clientX; dragState.startY = t.clientY;
    }
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const center = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };
    if (lastTouchDist > 0) {
      const zoom = dist / lastTouchDist;
      const newScale = Math.max(0.1, Math.min(8, transform.scale * zoom));
      const ratio = newScale / transform.scale;
      transform.x = center.x - (center.x - transform.x) * ratio;
      transform.y = center.y - (center.y - transform.y) * ratio;
      transform.scale = newScale;
    }
    if (lastTouchCenter) {
      transform.x += center.x - lastTouchCenter.x;
      transform.y += center.y - lastTouchCenter.y;
    }
    lastTouchDist = dist;
    lastTouchCenter = center;
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) {
    lastTouchDist = 0; lastTouchCenter = null;
  }
  if (e.touches.length === 0) {
    if (dragState.node) dragState.node.dragging = false;
    dragState.active = false; dragState.panning = false; dragState.node = null;
  }
});

// Mobile controls toggle
function toggleControls() {
  document.getElementById('controls').classList.toggle('open');
}

function toggleLegend() {
  const body = document.getElementById('legend-body');
  const icon = document.getElementById('legend-toggle');
  body.classList.toggle('collapsed');
  icon.classList.toggle('collapsed');
}

// Desktop panel slide toggles
function toggleDesktopControls() {
  const panel = document.getElementById('controls');
  const tab = document.getElementById('tab-controls');
  const isHidden = panel.classList.toggle('hidden');
  tab.classList.toggle('hidden', isHidden);
  const chevron = tab.querySelector('.chevron');
  chevron.style.transform = isHidden ? 'rotate(180deg)' : '';
}

function toggleDesktopLegend() {
  const panel = document.getElementById('legend');
  const tab = document.getElementById('tab-legend');
  const isHidden = panel.classList.toggle('hidden');
  tab.classList.toggle('hidden', isHidden);
  const chevron = tab.querySelector('.chevron');
  chevron.style.transform = isHidden ? 'rotate(180deg)' : '';
}

// Close mobile controls when clicking outside
document.addEventListener('click', e => {
  if (window.innerWidth <= 768) {
    const controls = document.getElementById('controls');
    const toggle = document.getElementById('mobile-toggle');
    if (!controls.contains(e.target) && !toggle.contains(e.target)) {
      controls.classList.remove('open');
    }
  }
});

// Start rendering
requestAnimationFrame(draw);
</script>
